<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>聖經史地互動地圖 V1.1.14</title>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@panzoom/panzoom@4.5.1/dist/panzoom.min.js"></script>
    <style>
        :root { --gold: #c5a059; --dark: #2c3e50; --brown: #5d4037; --ink-blue: rgba(50, 75, 95, 0.6); --handle-bg: #ddd; --base-fs: 14px; }
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; width: 100vw; height: 100dvh; overflow: hidden; background: #fdf6e3; font-family: "微軟正黑體", "Heiti TC", "Apple LiGothic Medium", sans-serif; }
        #app-container { display: flex; width: 100%; height: 100%; flex-direction: row; }

        @media (max-width: 800px) and (orientation: portrait) {
            #app-container { flex-direction: column; }
            #side-panel { width: 100% !important; height: 40%; order: 2; border-left: none; border-top: 2px solid var(--gold); }
            #map-section { height: 60%; order: 1; }
        }

        #map-section { flex: 1; position: relative; background: #eee; overflow: hidden; cursor: grab; }
        #map-section:active { cursor: grabbing; }
        #panzoom-element { width: 1000px; height: 1414px; position: relative; transform-origin: 0 0; }
        #main-map { width: 100%; height: 100%; display: block; -webkit-user-drag: none; }
        
        .marker {
            position: absolute; width: 12px; height: 12px; background: red; border-radius: 50%;
            transform: translate(-50%, -50%); cursor: pointer; border: 2px solid white;
            box-shadow: 0 0 5px rgba(0,0,0,0.5); z-index: 10; transition: transform 0.2s;
        }
        .marker:hover { transform: translate(-50%, -50%) scale(1.5); z-index: 100; }
        .marker-label {
            position: absolute; left: 14px; top: -5px; white-space: nowrap;
            background: rgba(255,255,255,0.9); padding: 2px 6px; border-radius: 4px;
            font-size: 12px; font-weight: bold; color: #333; border: 1px solid #ccc;
            pointer-events: none; opacity: 1; transition: opacity 0.2s;
        }

        #side-panel { width: 400px; background: #fff; display: flex; flex-direction: column; border-left: 2px solid var(--gold); box-shadow: -2px 0 10px rgba(0,0,0,0.1); position: relative; z-index: 200; }
        #panel-header { padding: 15px; background: var(--dark); color: white; }
        #panel-header h2 { margin: 0; font-size: 1.2rem; display: flex; align-items: center; justify-content: space-between; }
        #folder-select { width: 100%; margin-top: 10px; padding: 8px; border-radius: 4px; border: none; font-size: 14px; }
        
        #event-list { flex: 1; overflow-y: auto; padding: 10px; background: #f9f9f9; }
        .event-card { 
            background: white; border-radius: 8px; padding: 12px; margin-bottom: 12px;
            border-left: 5px solid var(--gold); box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            cursor: pointer; transition: 0.2s;
        }
        .event-card:hover { transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .event-card.active { background: #fff9e6; border-left-color: #e67e22; }
        .event-time { font-size: 11px; color: #7f8c8d; font-weight: bold; margin-bottom: 4px; }
        .event-content { font-size: 14px; line-height: 1.5; color: #2c3e50; }
        .event-meta { margin-top: 8px; font-size: 12px; display: flex; flex-wrap: wrap; gap: 8px; }
        .meta-tag { background: #eee; padding: 2px 8px; border-radius: 10px; color: #666; }
        .verse-link { color: #2980b9; text-decoration: none; font-weight: bold; }
        .verse-link:hover { text-decoration: underline; }

        .resizer-h { height: 8px; background: var(--handle-bg); cursor: ns-resize; width: 100%; display: none; }
        .resizer-v { width: 8px; background: var(--handle-bg); cursor: ew-resize; height: 100%; position: absolute; left: 0; top: 0; }
        @media (max-width: 800px) and (orientation: portrait) { .resizer-h { display: block; } .resizer-v { display: none; } }
    </style>
</head>
<body>

<div id="app-container">
    <div id="map-section">
        <div id="panzoom-element">
            <img src="picture-1.png" id="main-map" alt="Bible Map">
            <div id="marker-container"></div>
        </div>
    </div>

    <div id="side-panel">
        <div class="resizer-v" id="resizer-v"></div>
        <div class="resizer-h" id="resizer-h"></div>
        <div id="panel-header">
            <h2>聖經史地互動地圖 <span id="ver-tag" style="font-size: 0.7rem; opacity: 0.7;">V1.1.14</span></h2>
            <select id="folder-select">
                <option value="">-- 請選擇史地章節 --</option>
            </select>
        </div>
        <div id="event-list">
            <div style="text-align:center; color:#999; margin-top:50px;">請選擇左上角史地章節</div>
        </div>
    </div>
</div>

<script>
    let pz;
    let eventData = [];
    let coordData = [];
    let fullText = "";
    const bookMap = {
        "創世記": "gen", "出埃及記": "ex", "利未記": "lev", "民數記": "num", "申命記": "deut",
        "約書亞記": "josh", "士師記": "judg", "路得記": "ruth", "撒母耳記上": "1-sam", "撒母耳記下": "2-sam",
        "列王紀上": "1-kgs", "列王紀下": "2-kgs", "歷代志上": "1-chr", "歷代志下": "2-chr", "以斯拉記": "ezra",
        "尼希米記": "neh", "以斯帖記": "esth", "約伯記": "job", "詩篇": "ps", "箴言": "prov",
        "傳道書": "eccl", "雅歌": "song", "以賽亞書": "isa", "耶利米書": "jer", "耶利米哀歌": "lam",
        "以西結書": "ezek", "彈以理書": "dan", "何西阿書": "hos", "約珥書": "joel", "阿摩司書": "amos",
        "俄巴底亞書": "obad", "約拿書": "jonah", "彌迦書": "mic", "那鴻書": "nah", "哈巴谷書": "hab",
        "西番雅書": "zeph", "哈該書": "hag", "撒迦利亞書": "zech", "瑪拉基書": "mal",
        "馬太福音": "matt", "馬可福音": "mark", "路加福音": "luke", "約翰福音": "john", "使徒行傳": "acts",
        "羅馬書": "rom", "哥林多前書": "1-cor", "哥林多後書": "2-cor", "加拉太書": "gal", "以弗所書": "eph",
        "腓立比書": "phil", "歌羅西書": "col", "帖撒羅尼迦前書": "1-thess", "帖撒羅尼迦後書": "2-thess",
        "提摩太前書": "1-tim", "提摩太後書": "2-tim", "提多書": "tit", "腓利門書": "philem", "希伯來書": "heb",
        "雅各書": "james", "彼得前書": "1-pet", "彼得後書": "2-pet", "約翰一書": "1-jn", "約翰二書": "2-jn",
        "約翰三書": "3-jn", "猶大書": "jude", "啟示錄": "rev",
        "創": "gen", "出": "ex", "利": "lev", "民": "num", "申": "deut", "書": "josh", "士": "judg", "得": "ruth",
        "撒上": "1-sam", "撒下": "2-sam", "王上": "1-kgs", "王下": "2-kgs", "代上": "1-chr", "代下": "2-chr",
        "拉": "ezra", "尼": "neh", "帖": "esth", "伯": "job", "詩": "ps", "箴": "prov", "傳": "eccl", "歌": "song",
        "賽": "isa", "耶": "jer", "哀": "lam", "結": "ezek", "但": "dan", "何": "hos", "珥": "joel", "摩": "amos",
        "俄": "obad", "拿": "jonah", "彌": "mic", "鴻": "nah", "哈": "hab", "番": "zeph", "該": "hag", "亞": "zech", "瑪": "mal",
        "太": "matt", "可": "mark", "路": "luke", "翰": "john", "徒": "acts", "羅": "rom", "林前": "1-cor", "林後": "2-cor",
        "加": "gal", "弗": "eph", "腓": "phil", "西": "col", "帖前": "1-thess", "帖後": "2-thess", "提前": "1-tim", "提後": "2-tim",
        "多": "tit", "門": "philem", "來": "heb", "雅": "james", "彼前": "1-pet", "彼後": "2-pet", "約一": "1-jn", "約二": "2-jn", "約三": "3-jn", "猶": "jude", "啟": "rev",
        "JST Genesis": "jst-gen", "約譯創世記": "jst-gen", "約譯馬太": "jst-matt", "JST Matthew": "jst-matt"
    };

    function parseCSV(text) {
        const rows = []; let current = []; let inQuoted = false; let token = "";
        for (let i = 0; i < text.length; i++) {
            const char = text[i]; const next = text[i+1];
            if (inQuoted) {
                if (char === '"' && next === '"') { token += '"'; i++; }
                else if (char === '"') inQuoted = false;
                else token += char;
            } else {
                if (char === '"') inQuoted = true;
                else if (char === ',' || char === '\n' || char === '\r') {
                    current.push(token.trim()); token = "";
                    if (char !== ',') { if (current.length > 0) rows.push(current); current = []; if (char === '\r' && next === '\n') i++; }
                } else token += char;
            }
        }
        if (token || current.length > 0) { current.push(token.trim()); rows.push(current); }
        return rows;
    }

    function formatVerse(v) {
        if (!v) return "";
        return v.replace(/(JST\s+[\w]+|[\u4e00-\u9fa5]{1,4})\s*(\d+):(\d+)(-\d+)?/g, (match, book, chap, start, end) => {
            const b = book.trim();
            const bookCode = bookMap[b] || "";
            let cat = "ot";
            if (b.match(/馬太|太|馬可|路加|約翰/)) cat = "nt";
            if (b.startsWith("JST") || b.startsWith("約譯")) cat = "jst";
            
            const url = `https://www.churchofjesuschrist.org/study/scriptures/${cat}/${bookCode}/${chap}?lang=zho&id=p${start}${end || ""}`;
            return `<a href="${url}" target="_blank" class="verse-link">${match}</a>`;
        });
    }

    async function loadFolder(folder) {
        if (!folder) return;
        localStorage.setItem('lastBibleFolder', folder);
        const [cRes, dRes] = await Promise.all([ fetch(`coords-${folder}.csv`), fetch(`data-${folder}.csv`) ]);
        const cText = await cRes.text(); const dText = await dRes.text();
        fullText = dText;
        const cRows = parseCSV(cText).slice(1);
        coordData = cRows.map(r => ({ n: r[1], x: parseFloat(r[5]), y: parseFloat(r[6]), s: parseInt(r[7]) || 0 }));
        const dRows = parseCSV(dText).slice(1);
        eventData = dRows.map(r => ({ id: r[0], time: r[1], content: r[2], geo: r[3], verse: r[4], note: r[5], _searchStr: (r[2]+r[3]+r[5]) }));
        
        updateMarkers(); renderEvents(); syncOverlay();
    }

    function updateMarkers() {
        const container = document.getElementById('marker-container');
        container.innerHTML = "";
        coordData.forEach(data => {
            if (!data.n) return;
            const m = document.createElement('div'); m.className = 'marker';
            m.style.left = data.x + "%"; m.style.top = data.y + "%";
            
            const safeName = data.n.trim().replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            m.dataset.freq = (fullText.match(new RegExp(safeName, 'g')) || []).length;
            m.dataset.size = data.s || 0;
            
            const label = document.createElement('div'); label.className = 'marker-label';
            label.innerText = data.n; m.appendChild(label);
            m.onclick = () => filterEventsByGeo(data.n);
            container.appendChild(m);
        });
        applyMarkerStyles();
        setTimeout(refreshCollision, 100);
    }

    function applyMarkerStyles() {
        const scale = pz.getScale();
        document.querySelectorAll('.marker').forEach(m => {
            const freq = parseInt(m.dataset.freq) || 1;
            const sizeBase = parseInt(m.dataset.size) || 0;
            const base = (window.innerWidth < 800) ? 8 : 12;
            const finalSize = (base + Math.sqrt(freq) * 2 + sizeBase) / scale;
            m.style.width = finalSize + "px"; m.style.height = finalSize + "px";
            const lb = m.querySelector('.marker-label');
            if (lb) {
                lb.style.fontSize = (12/scale) + "px"; lb.style.left = (finalSize*0.8) + "px";
                lb.style.padding = `${2/scale}px ${6/scale}px`;
            }
        });
    }

    function refreshCollision() {
        const scale = pz.getScale();
        const markers = Array.from(document.querySelectorAll('.marker'));
        markers.sort((a,b) => (parseInt(b.dataset.freq)||0) - (parseInt(a.dataset.freq)||0));
        const usedRects = [];
        markers.forEach(m => {
            const lb = m.querySelector('.marker-label'); if (!lb) return;
            const rect = lb.getBoundingClientRect();
            let overlap = usedRects.some(r => !(rect.right < r.left || rect.left > r.right || rect.bottom < r.top || rect.top > r.bottom));
            if (overlap && parseInt(m.dataset.freq) < 3) { lb.style.opacity = 0; }
            else { lb.style.opacity = 1; usedRects.push(rect); }
        });
    }

    function renderEvents(filterText = "") {
        const list = document.getElementById('event-list');
        list.innerHTML = "";
        const filtered = filterText ? eventData.filter(e => e.geo.includes(filterText)) : eventData;
        filtered.forEach(e => {
            const card = document.createElement('div'); card.className = 'event-card';
            card.innerHTML = `
                <div class="event-time">${e.time}</div>
                <div class="event-content">${e.content}</div>
                <div class="event-meta">
                    <span class="meta-tag">📍 ${e.geo}</span>
                    <span>📖 ${formatVerse(e.verse)}</span>
                </div>
                ${e.note ? `<div style="margin-top:8px; font-size:12px; color:#666; border-top:1px dashed #eee; padding-top:4px;">註: ${e.note}</div>` : ""}
            `;
            card.onclick = () => {
                document.querySelectorAll('.event-card').forEach(c => c.classList.remove('active'));
                card.classList.add('active');
                focusGeo(e.geo);
            };
            list.appendChild(card);
        });
    }

    function focusGeo(geoStr) {
        const target = coordData.find(c => geoStr.includes(c.n));
        if (target) {
            const container = document.getElementById('map-section');
            const cw = container.clientWidth; const ch = container.clientHeight;
            const tx = (target.x / 100) * 1000; const ty = (target.y / 100) * 1414;
            pz.zoom(2.5, { animate: true });
            setTimeout(() => pz.pan(cw/2 - tx*2.5, ch/2 - ty*2.5, { animate: true }), 100);
        }
    }

    function filterEventsByGeo(name) { renderEvents(name); }

    let lastLandscapeWidth = "400px";
    let lastPortraitHeight = "40%";
    const resizerV = document.getElementById('resizer-v');
    const resizerH = document.getElementById('resizer-h');
    const sidePanel = document.getElementById('side-panel');

    resizerV.addEventListener('mousedown', e => {
        document.addEventListener('mousemove', resizeV);
        document.addEventListener('mouseup', () => document.removeEventListener('mousemove', resizeV));
    });
    function resizeV(e) {
        let w = window.innerWidth - e.clientX;
        if (w > 200 && w < window.innerWidth * 0.8) {
            lastLandscapeWidth = w + "px"; sidePanel.style.width = lastLandscapeWidth;
            sidePanel.style.flex = "none"; syncOverlay(); updateMinScale(); refreshCollision();
        }
    }
    resizerH.addEventListener('mousedown', e => {
        document.addEventListener('mousemove', resizeH);
        document.addEventListener('mouseup', () => document.removeEventListener('mousemove', resizeH));
    });
    function resizeH(e) {
        let h = window.innerHeight - e.clientY;
        if (h > 150 && h < window.innerHeight * 0.8) {
            lastPortraitHeight = h + "px"; sidePanel.style.height = lastPortraitHeight;
            sidePanel.style.flex = `0 0 ${lastPortraitHeight}`; syncOverlay(); updateMinScale(); refreshCollision();
        }
    }

    function syncOverlay() { if(pz) pz.setOptions({ contain: 'outside' }); }
    function updateMinScale() {
        const container = document.getElementById('map-section');
        const minScale = Math.max(container.clientWidth / 1000, container.clientHeight / 1414);
        pz.setOptions({ minScale });
    }

    window.onload = async () => {
        const el = document.getElementById('panzoom-element'); pz = Panzoom(el, { maxScale: 8, contain: 'outside', animate: true });
        window.addEventListener('resize', () => { 
            const side = document.getElementById('side-panel');
            if (window.innerWidth < window.innerHeight) { side.style.width = ""; side.style.height = lastPortraitHeight; side.style.flex = `0 0 ${lastPortraitHeight}`; }
            else { side.style.height = ""; side.style.width = lastLandscapeWidth; side.style.flex = "none"; }
            syncOverlay(); updateMinScale(); refreshCollision(); 
        });
        el.addEventListener('panzoomchange', () => { applyMarkerStyles(); refreshCollision(); });
        document.getElementById('map-section').addEventListener('wheel', pz.zoomWithWheel);
        
        const res = await fetch(`folder.csv?t=${Date.now()}`); const folders = parseCSV(await res.text()).slice(1);
        const select = document.getElementById('folder-select'); select.innerHTML = '<option value="">-- 請選擇史地章節 --</option>';
        folders.forEach(f => { if(f[0]) { const opt = document.createElement('option'); opt.value = f[0]; opt.innerText = f[1] || f[0]; select.appendChild(opt); } });
        
        const last = localStorage.getItem('lastBibleFolder');
        if (last) { select.value = last; loadFolder(last); }
        select.onchange = (e) => loadFolder(e.target.value);
        updateMinScale();
    };
</script>

</body>
</html>
