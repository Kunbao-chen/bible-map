<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>亞伯拉罕史地互動地圖 V4.5</title>
    <script src="https://unpkg.com/@panzoom/panzoom@4.5.1/dist/panzoom.min.js"></script>
    <style>
        :root { --gold: #c5a059; --bg-dark: #2c3e50; --text-light: #ecf0f1; }
        * { box-sizing: border-box; font-family: "微軟正黑體", sans-serif; }
        body { margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; background: #222; }
        
        #app-container { display: flex; flex-direction: column; height: 100%; width: 100%; }
        @media (min-aspect-ratio: 1/1) { #app-container { flex-direction: row; } }

        #map-section { flex: 1.5; position: relative; overflow: hidden; background: #222; cursor: grab; }
        #panzoom-element { position: relative; display: inline-block; transform-origin: 0 0; }
        #bg-map { display: block; pointer-events: none; visibility: hidden; } /* 初始隱藏避免跳動 */
        
        #overlay-container { position: absolute; pointer-events: none; top: 0; left: 0; }
        #svg-layer, #marker-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        /* 標籤基礎樣式 */
        .marker { position: absolute; transform: translate(-50%, -50%); padding: 4px 10px; border-radius: 20px; font-size: 13px; font-weight: bold; background: rgba(255,255,255,0.95); border: 1px solid #777; color: #333; white-space: nowrap; transition: opacity 0.2s; pointer-events: auto; cursor: pointer; z-index: 50; box-shadow: 0 2px 6px rgba(0,0,0,0.3); }
        .marker.active { background: var(--gold); color: white; border: 2px solid white; font-size: 15px; z-index: 100; box-shadow: 0 0 15px rgba(197, 160, 89, 0.8); }
        .marker.low-priority { opacity: 0.85; font-size: 11px; font-weight: normal; }
        
        /* 衝突隱藏模式：直接變小圓點 */
        .marker-dot-only { padding: 0; width: 10px; height: 10px; border-radius: 50%; background: #888; border: 1px solid white; color: transparent !important; overflow: hidden; z-index: 10; opacity: 0.6; }
        .marker-dot-only:hover { opacity: 1; background: var(--gold); transform: translate(-50%, -50%) scale(1.5); color: transparent !important; }

        /* 區域背景圈圈 (不含文字) */
        .marker-area-circle { position: absolute; transform: translate(-50%, -50%); border-radius: 50%; background: rgba(197, 160, 89, 0.2); border: 3px dashed rgba(255, 255, 255, 0.6); pointer-events: none; z-index: 5; aspect-ratio: 1/1; }

        #table-section { flex: 1; background: white; overflow-y: auto; border-top: 5px solid var(--gold); }
        @media (min-aspect-ratio: 1/1) { #table-section { border-top: none; border-left: 5px solid var(--gold); } }
        table { width: 100%; border-collapse: collapse; }
        th { background: var(--bg-dark); color: white; position: sticky; top: 0; padding: 12px; text-align: left; z-index: 20; }
        td { padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; }
        tr.selected td { background: #fff9c4; font-weight: bold; border-left: 5px solid var(--gold); }

        /* 資訊框 UI */
        #info-box { position: fixed; top: 20px; right: 20px; width: 300px; background: white; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); border-top: 6px solid var(--gold); z-index: 999; display: none; flex-direction: column; }
        #info-header { padding: 10px; background: #f4f4f4; display: flex; justify-content: space-between; align-items: center; border-radius: 8px 8px 0 0; cursor: grab; }
        #info-body { padding: 15px; max-height: 60vh; overflow-y: auto; }
        .info-btn { border: none; background: none; cursor: pointer; font-size: 18px; color: #666; padding: 0 5px; }

        .controls-map { position: absolute; bottom: 20px; left: 20px; z-index: 100; display: flex; flex-direction: column; gap: 8px; }
        .controls-map button { width: 45px; height: 45px; border-radius: 8px; border: 1px solid #ccc; background: white; cursor: pointer; font-size: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div id="app-container">
    <div id="map-section">
        <div id="panzoom-element">
            <img src="Abraham_2_Cute.png" id="bg-map">
            <div id="overlay-container">
                <svg id="svg-layer"></svg>
                <div id="marker-layer"></div>
            </div>
        </div>
        <div class="controls-map">
            <button onclick="pz.zoomIn()">+</button>
            <button onclick="pz.zoomOut()">-</button>
            <button onclick="resetView()">↺</button>
        </div>
    </div>
    <div id="table-section">
        <table id="main-table">
            <thead><tr><th width="50">#</th><th>事件</th></tr></thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<div id="info-box">
    <div id="info-header">
        <span style="font-weight:bold;">📍 事件詳情</span>
        <div><button onclick="toggleInfoBody()" class="info-btn">_</button><button onclick="closeInfoBox()" class="info-btn">✕</button></div>
    </div>
    <div id="info-body">
        <h3 id="info-title" style="margin:0;color:var(--gold);"></h3>
        <p id="info-loc-tags"></p>
        <p>經文：<span id="info-scripture" style="color:#2980b9;"></span></p>
        <p id="info-note" style="font-size:13px; color:#666;"></p>
    </div>
</div>

<script>
    let pz, eventData = [], coordsData = {}, freqMap = {};
    let currentMap = 'small', currentActivePlaces = [];
    const mapImg = document.getElementById('bg-map');
    const overlay = document.getElementById('overlay-container');
    const elem = document.getElementById('panzoom-element');

    // 初始化 Panzoom
    pz = Panzoom(elem, { maxScale: 5, minScale: 0.1, contain: 'outside', canvas: true });
    document.getElementById('map-section').addEventListener('wheel', pz.zoomWithWheel);

    async function loadData() {
        const [cRes, dRes] = await Promise.all([fetch('coords.csv'), fetch('data.csv')]);
        const cText = await cRes.text();
        const dText = await dRes.text();

        parseCSV(cText).slice(1).forEach(r => {
            if(r[0]) coordsData[r[0]] = { xs: r[1], ys: r[2], xl: r[3], yl: r[4], type: r[5]||'Point', radius: r[6]||5 };
        });

        const tbody = document.getElementById('table-body');
        parseCSV(dText).slice(1).forEach((r, i) => {
            if(!r[0]) return;
            const locs = r[3].split('→').map(p => p.replace(/\(.*?\)/g, '').trim());
            locs.forEach(p => { freqMap[p] = (freqMap[p] || 0) + 1; });
            eventData.push({ id: r[0], event: r[2], loc: r[3], script: r[4], note: r[5] });
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${r[0]}</td><td>${r[2]}</td>`;
            tr.onclick = () => selectEvent(i, tr);
            tbody.appendChild(tr);
        });

        mapImg.onload = () => { 
            mapImg.style.visibility = 'visible'; 
            syncOverlaySize();
            pz.reset();
            renderMarkers('small', []);
        };
    }

    // 關鍵修正：確保圖片加載完成才進行座標計算
    async function changeMapImage(target) {
        if (currentMap === target) return;
        return new Promise(resolve => {
            currentMap = target;
            mapImg.style.visibility = 'hidden'; // 防止閃爍
            mapImg.src = target === 'large' ? 'Abraham_1_Cute.png' : 'Abraham_2_Cute.png';
            mapImg.onload = () => {
                syncOverlaySize();
                pz.reset();
                mapImg.style.visibility = 'visible';
                resolve();
            };
        });
    }

    function syncOverlaySize() {
        overlay.style.width = mapImg.clientWidth + "px";
        overlay.style.height = mapImg.clientHeight + "px";
    }

    async function selectEvent(idx, tr) {
        document.querySelectorAll('tr').forEach(r => r.classList.remove('selected'));
        tr.classList.add('selected');
        
        const item = eventData[idx];
        const places = item.loc.split('→').map(p => p.replace(/\(.*?\)/g, '').trim());
        let activePlaces = [], needLarge = false;

        places.forEach(p => {
            if(coordsData[p]) {
                activePlaces.push({ ...coordsData[p], name: p });
                if (!coordsData[p].xs) needLarge = true;
            }
        });

        currentActivePlaces = activePlaces;
        await changeMapImage(needLarge ? 'large' : 'small');
        renderMarkers(currentMap, activePlaces);
        flyTo(activePlaces);
        showInfo(item, activePlaces);
    }

    function renderMarkers(type, actives) {
        const markerLayer = document.getElementById('marker-layer');
        const svgLayer = document.getElementById('svg-layer');
        markerLayer.innerHTML = ''; svgLayer.innerHTML = '';
        
        const X = type === 'large' ? 'xl' : 'xs', Y = type === 'large' ? 'yl' : 'ys';
        const activeNames = actives.map(a => a.name);

        // 畫路徑線
        if(actives.length > 1) {
            actives.forEach((p, i) => {
                if(i < actives.length-1 && actives[i+1][X]) {
                    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    line.setAttribute('x1', p[X]+'%'); line.setAttribute('y1', p[Y]+'%');
                    line.setAttribute('x2', actives[i+1][X]+'%'); line.setAttribute('y2', actives[i+1][Y]+'%');
                    line.setAttribute('stroke', '#e74c3c'); line.setAttribute('stroke-width', '4'); line.setAttribute('stroke-dasharray', '8,5');
                    svgLayer.appendChild(line);
                }
            });
        }

        // 排序：Active > 頻率高 > 低
        const sortedKeys = Object.keys(coordsData).sort((a,b) => {
            if (activeNames.includes(a) && !activeNames.includes(b)) return -1;
            if (!activeNames.includes(a) && activeNames.includes(b)) return 1;
            return (freqMap[b]||0) - (freqMap[a]||0);
        });

        let placedRects = [];
        sortedKeys.forEach(name => {
            const loc = coordsData[name];
            if(!loc[X]) return;

            const isActive = activeNames.includes(name);
            
            // 如果是 Area 且 active，畫出背景圓圈
            if (loc.type === 'Area' && isActive) {
                const circle = document.createElement('div');
                circle.className = 'marker-area-circle';
                circle.style.cssText = `left:${loc[X]}%; top:${loc[Y]}%; width:${loc.radius}%;`;
                markerLayer.appendChild(circle);
            }

            // 所有地名(含Area名)都作為 Marker 進入碰撞偵測
            const m = document.createElement('div');
            m.style.left = loc[X] + '%'; m.style.top = loc[Y] + '%';
            m.textContent = name;
            m.onclick = () => flyTo([{...loc, name}]);

            const rect = getRect(loc[X], loc[Y], name.length);
            const isColliding = placedRects.some(p => checkCollision(rect, p));

            if (isActive) {
                m.className = 'marker active';
                markerLayer.appendChild(m);
                placedRects.push(rect);
            } else if (!isColliding) {
                m.className = 'marker low-priority';
                markerLayer.appendChild(m);
                placedRects.push(rect);
            } else {
                // 碰撞了：縮小為點，直接隱藏地名
                m.className = 'marker marker-dot-only';
                m.title = name;
                markerLayer.appendChild(m);
            }
        });
    }

    function getRect(xPct, yPct, len) {
        const xPx = (xPct/100) * overlay.offsetWidth, yPx = (yPct/100) * overlay.offsetHeight;
        const w = len * 12 + 20, h = 26;
        return { l: xPx - w/2, r: xPx + w/2, t: yPx - h/2, b: yPx + h/2 };
    }
    function checkCollision(a, b) { return !(a.r < b.l || a.l > b.r || a.b < b.t || a.t > b.m); }

    function flyTo(pts) {
        const X = currentMap === 'large' ? 'xl' : 'xs', Y = currentMap === 'large' ? 'yl' : 'ys';
        let sx=0, sy=0, c=0;
        pts.forEach(p => { if(p[X]){ sx+=parseFloat(p[X]); sy+=parseFloat(p[Y]); c++; }});
        if(!c) return;
        const tx = (sx/c/100)*overlay.offsetWidth, ty = (sy/c/100)*overlay.offsetHeight;
        const sc = pz.getScale();
        pz.pan((elem.parentElement.offsetWidth/2)-(tx*sc), (elem.parentElement.offsetHeight/2)-(ty*sc), {animate:true});
    }

    function showInfo(item, actives) {
        const box = document.getElementById('info-box');
        box.style.display = 'flex';
        document.getElementById('info-title').textContent = item.event;
        document.getElementById('info-scripture').textContent = item.script;
        document.getElementById('info-note').textContent = item.note;
        const tags = document.getElementById('info-loc-tags');
        tags.innerHTML = '';
        actives.forEach(p => {
            const s = document.createElement('span'); s.className = 'loc-tag'; s.textContent = p.name;
            s.style.cssText = "background:#eee; padding:2px 8px; margin:2px; border-radius:10px; cursor:pointer; display:inline-block;";
            s.onclick = () => flyTo([p]); tags.appendChild(s);
        });
    }

    function toggleInfoBody() { 
        const b = document.getElementById('info-body'); 
        b.style.display = b.style.display === 'none' ? 'block' : 'none'; 
    }
    function closeInfoBox() { document.getElementById('info-box').style.display = 'none'; }
    function resetView() { pz.reset(); if(currentActivePlaces.length) flyTo(currentActivePlaces); }

    window.onload = loadData;
    parseCSV = (t) => {
        let r=[], c=[], cell='', q=false;
        for(let i=0; i<t.length; i++){
            let char=t[i];
            if(char==='"' && t[i+1]==='"'){ cell+='"'; i++; }
            else if(char==='"'){ q=!q; }
            else if(char===',' && !q){ c.push(cell.trim()); cell=''; }
            else if(char==='\n' && !q){ c.push(cell.trim()); r.push(c); c=[]; cell=''; }
            else if(char!=='\r') cell+=char;
        }
        if(cell||c.length) { c.push(cell.trim()); r.push(c); }
        return r;
    };
</script>
</body>
</html>
