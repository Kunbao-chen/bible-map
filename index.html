<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>亞伯拉罕史地互動地圖 V10.6.6</title>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@panzoom/panzoom@4.5.1/dist/panzoom.min.js"></script>
    <style>
        :root { --gold: #c5a059; --dark: #2c3e50; --brown: #5d4037; --ink-blue: rgba(50, 75, 95, 0.6); --handle-bg: #ddd; }
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; width: 100vw; height: 100dvh; overflow: hidden; background: #fdf6e3; font-family: "微軟正黑體", sans-serif; }
        
        #app-container { display: flex; width: 100%; height: 100%; }
        @media (max-width: 800px) and (orientation: portrait) { #app-container { flex-direction: column; } #side-panel { width: 100% !important; flex: 0 0 50dvh; } }

        #map-section { flex: 1; position: relative; overflow: hidden; background: #e5d3b3; }
        #panzoom-element { display: inline-block; position: relative; }
        #bg-map { display: block; max-width: none; user-select: none; }
        
        /* 標籤點擊精確化 */
        .marker { position: absolute; transform-origin: center; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; z-index: 10; pointer-events: none; }
        .marker .dot { width: 6px; height: 6px; background: rgba(93,64,55,0.7); border-radius: 50%; margin-bottom: 2px; pointer-events: auto; cursor: pointer; }
        .marker .label { 
            opacity: 0; padding: 2px 6px; border-radius: 8px; background: rgba(255,255,255,0.9); 
            border: 1.5px solid var(--brown); white-space: nowrap; font-weight: bold; font-size: 13px; 
            color: var(--brown); transition: opacity 0.3s; pointer-events: auto; cursor: pointer;
        }

        /* 搜尋歷史選單設計 (問題 1) */
        .search-container { position: absolute; right: 12px; top: 12px; z-index: 2000; display: flex; flex-direction: column; align-items: flex-end; }
        .search-bar-wrapper { display: flex; align-items: center; background: rgba(255,255,255,0.7); backdrop-filter: blur(8px); border-radius: 12px; border: 2px solid var(--brown); }
        #search-input { width: 0; opacity: 0; transition: all 0.4s ease; border: none; background: transparent; height: 36px; outline: none; }
        #search-input.open { width: 180px; opacity: 1; padding: 0 10px; }
        .search-clear { cursor: pointer; display: none; padding: 0 10px; font-size: 20px; color: var(--brown); }
        .search-btn { width: 40px; height: 40px; border: none; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        #search-history-dropdown { 
            display: none; width: 230px; background: white; border: 1.5px solid var(--brown); border-top: none;
            border-bottom-left-radius: 12px; border-bottom-right-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-height: 200px; overflow-y: auto; scrollbar-width: thin;
        }
        .history-item { padding: 10px 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; cursor: pointer; font-size: 14px; }
        .history-item:hover { background: #fffde7; }
        .history-del { color: #ccc; padding: 5px; transition: color 0.2s; }
        .history-del:hover { color: #d32f2f; }

        #resizer-main { background: var(--handle-bg); z-index: 1100; display: flex; align-items: center; justify-content: center; touch-action: none; }
        @media (min-width: 801px), (orientation: landscape) { #resizer-main { width: 12px; cursor: col-resize; height: 100%; } #resizer-main::after { content: "⋮"; } }
        @media (max-width: 800px) and (orientation: portrait) { #resizer-main { height: 16px; cursor: row-resize; width: 100%; } #resizer-main::after { content: "⋯"; } }

        #side-panel { background: white; display: flex; flex-direction: column; overflow: hidden; }
        #info-area { display: none; flex-direction: column; background: #fff; min-height: 44px; }
        #info-header { background: var(--dark); color: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; height: 44px; }
        #list-container { flex: 1; overflow-y: auto; }
        tr.active-row td { background: #fffde7; font-weight: bold; border-left: 5px solid var(--gold); }
    </style>
</head>
<body>

<div id="app-container">
    <div id="map-section">
        <div class="search-container">
            <div class="search-bar-wrapper">
                <input type="text" id="search-input" placeholder="搜尋全經文..." oninput="handleSearchInput()" onfocus="showHistory()">
                <div id="search-clear" class="search-clear" onclick="clearSearch()">×</div>
                <button class="search-btn" onclick="toggleSearch()"><svg viewBox="0 0 24 24" width="22" fill="#5d4037"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></button>
            </div>
            <div id="search-history-dropdown"></div>
        </div>
        
        <div id="panzoom-element">
            <img src="" id="bg-map">
            <div id="overlay-container" style="position:absolute; top:0; left:0; pointer-events:none;">
                <svg id="svg-layer" style="position:absolute; width:100%; height:100%;"></svg>
                <div id="marker-layer"></div>
            </div>
        </div>
    </div>
    
    <div id="resizer-main"></div>
    
    <div id="side-panel">
        <div id="folder-nav" style="padding:10px; background:#eee;"><select id="folder-select" onchange="loadProject(this.value)" style="width:100%; padding:8px;"></select></div>
        <div id="info-area">
            <div id="info-header" onclick="toggleInfo()"><div>📜 詳情 <span id="info-arrow">▼</span></div><div style="display:flex; gap:10px;"><button onclick="navEvent(-1); event.stopPropagation();">◀</button><button onclick="navEvent(1); event.stopPropagation();">▶</button></div></div>
            <div id="info-body" style="padding:15px; overflow-y:auto; flex:1;">
                <div id="info-time" style="color:#888;"></div>
                <h3 id="info-title" style="color:var(--gold); margin:5px 0;"></h3>
                <div id="info-path" style="background:#f9f9f9; padding:8px; border-radius:4px; margin:5px 0; font-weight:bold;"></div>
                <p id="info-script" style="color:#2980b9;"></p>
                <div id="info-note"></div>
            </div>
        </div>
        <div id="resizer-inner" style="height:12px; background:#eee; cursor:row-resize; border-top:1px solid #ddd; display:flex; justify-content:center; align-items:center;">⋯</div>
        <div id="list-container"><table><tbody id="table-body"></tbody></table></div>
    </div>
</div>

<script>
    let pz, eventData = [], filteredData = [], allCoords = [], locFreq = {}, currentFolder = '', currentMapIdx = -1, currentEventIdx = -1;
    let searchHistory = JSON.parse(localStorage.getItem('bibleSearchHistory') || '[]');
    let lastActiveId = null; // 紀錄離開搜尋前最後點選的 ID

    // --- 搜尋邏輯 (問題 3, 4, 5) ---
    function toggleSearch() {
        const input = document.getElementById('search-input');
        input.classList.toggle('open');
        if (input.classList.contains('open')) input.focus(); else hideHistory();
    }

    function handleSearchInput() {
        const val = document.getElementById('search-input').value.trim();
        document.getElementById('search-clear').style.display = val ? 'block' : 'none';
        executeSearch(val, false);
    }

    function executeSearch(keyword, updateInput = true) {
        if (updateInput) {
            const input = document.getElementById('search-input');
            input.value = keyword;
            input.classList.add('open');
            document.getElementById('search-clear').style.display = 'block';
        }
        
        filteredData = eventData.filter(d => 
            Object.values(d).some(v => String(v).toLowerCase().includes(keyword.toLowerCase()))
        );
        
        renderTable(filteredData);
        
        // 問題 5: 自動點選第一項
        if (filteredData.length > 0) {
            selectEvent(0);
            if (keyword.length > 1) saveHistory(keyword);
        }
    }

    function clearSearch() {
        const input = document.getElementById('search-input');
        input.value = '';
        input.classList.remove('open');
        document.getElementById('search-clear').style.display = 'none';
        hideHistory();
        
        filteredData = [...eventData];
        renderTable(filteredData);
        
        // 問題 4: 回到最後一次點選的事件
        const resumeIdx = filteredData.findIndex(d => d.id === lastActiveId);
        selectEvent(resumeIdx !== -1 ? resumeIdx : 0, true);
    }

    // --- 歷史紀錄 (問題 1) ---
    function saveHistory(term) {
        searchHistory = [term, ...searchHistory.filter(h => h !== term)].slice(0, 10);
        localStorage.setItem('bibleSearchHistory', JSON.stringify(searchHistory));
        renderHistory();
    }

    function renderHistory() {
        const drop = document.getElementById('search-history-dropdown');
        drop.innerHTML = searchHistory.map(h => `
            <div class="history-item" onclick="executeSearch('${h}')">
                <span>${h}</span>
                <span class="history-del" onclick="deleteHistory(event, '${h}')">×</span>
            </div>
        `).join('');
    }

    function deleteHistory(e, h) {
        e.stopPropagation();
        searchHistory = searchHistory.filter(item => item !== h);
        localStorage.setItem('bibleSearchHistory', JSON.stringify(searchHistory));
        renderHistory();
    }
    function showHistory() { if(searchHistory.length) document.getElementById('search-history-dropdown').style.display = 'block'; renderHistory(); }
    function hideHistory() { setTimeout(() => document.getElementById('search-history-dropdown').style.display = 'none', 200); }

    // --- 地圖渲染 (問題 2, 3) ---
    function renderVisuals(db, logic) {
        const ml = document.getElementById('marker-layer'), sl = document.getElementById('svg-layer');
        sl.innerHTML = '';
        logic.paths.forEach(p => {
            for (let i = 0; i < p.length - 1; i++) {
                const l = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                l.setAttribute('x1', p[i].x+'%'); l.setAttribute('y1', p[i].y+'%');
                l.setAttribute('x2', p[i+1].x+'%'); l.setAttribute('y2', p[i+1].y+'%');
                l.setAttribute('stroke', '#d32f2f'); l.setAttribute('stroke-width', '2');
                sl.appendChild(l);
            }
        });

        ml.innerHTML = '';
        db.forEach(data => {
            const isH = logic.points.some(p => p.n === data.n);
            const m = document.createElement('div');
            m.className = `marker ${isH ? 'highlight' : ''} ${data.size > 2 ? 'region-type' : ''}`;
            m.style.left = data.x + '%'; m.style.top = data.y + '%';
            m.dataset.name = data.n;
            m.dataset.size = data.size;
            
            // 問題 2: 精確化點擊區域
            m.innerHTML = `<div class="dot" onclick="executeSearch('${data.n}')"></div><div class="label" onclick="executeSearch('${data.n}')">${data.n}</div>`;
            ml.appendChild(m);
        });
        
        applyMarkerStyles();
        if (logic.points.length) flyTo(logic.points);
        setTimeout(refreshCollision, 100);
    }

    // --- 資料加載與權重分析 (問題 3) ---
    async function loadProject(folder) {
        if (!folder) return;
        currentFolder = folder; localStorage.setItem('lastBibleFolder', folder);
        allCoords = []; locFreq = {};
        
        const dRes = await fetch(`${folder}/data.csv?t=${Date.now()}`);
        const rows = parseCSV(await dRes.text()).slice(1).filter(r => r.length > 2);
        eventData = rows.map(r => ({ id:r[0], time:r[1], event:r[2], loc:r[3], script:r[4], note:r[5] }));
        
        // 分析全文字頻 (問題 3)
        const fullText = eventData.map(d => Object.values(d).join(" ")).join(" ");
        
        for (let x = 1; x <= 15; x++) {
            try {
                const cRes = await fetch(`${folder}/coords-${x}.csv?t=${Date.now()}`);
                if (!cRes.ok) break;
                parseCSV(await cRes.text()).slice(1).forEach(r => {
                    if(r[1] && r[5]) {
                        const name = r[1].trim();
                        allCoords.push({ n: name, x: r[5], y: r[6], mapIdx: x, size: parseInt(r[7])||0 });
                        if (locFreq[name] === undefined) {
                            locFreq[name] = (fullText.match(new RegExp(name, 'g')) || []).length;
                        }
                    }
                });
            } catch(e) { break; }
        }
        filteredData = [...eventData];
        renderTable(filteredData);
        selectEvent(0);
    }

    function refreshCollision() {
        const markers = Array.from(document.querySelectorAll('.marker'));
        // 問題 3: 根據字頻權重排序，決定誰優先顯示
        markers.sort((a, b) => {
            if (a.classList.contains('highlight')) return -1;
            if (b.classList.contains('highlight')) return 1;
            return (locFreq[b.dataset.name] || 0) - (locFreq[a.dataset.name] || 0);
        });

        const occupied = [];
        markers.forEach(m => {
            const label = m.querySelector('.label');
            const rect = label.getBoundingClientRect();
            const overlap = occupied.some(o => !(rect.right<o.left || rect.left>o.right || rect.bottom<o.top || rect.top>o.bottom));
            if (overlap && !m.classList.contains('highlight')) {
                label.style.opacity = "0"; label.style.pointerEvents = "none";
            } else { 
                label.style.opacity = "1"; label.style.pointerEvents = "auto";
                occupied.push(rect); 
            }
        });
    }

    // --- 導航機制 (問題 4, 5) ---
    function selectEvent(idx, scroll = false) {
        if (idx < 0 || idx >= filteredData.length) return;
        currentEventIdx = idx;
        const item = filteredData[idx];
        lastActiveId = item.id; // 紀錄最後活動 ID
        
        Array.from(document.getElementById('table-body').rows).forEach((r, i) => r.className = i === idx ? 'active-row' : '');
        updateMapAndInfo(item);
        if(scroll) document.getElementById('table-body').rows[idx]?.scrollIntoView({behavior:'smooth', block:'center'});
    }

    function navEvent(step) {
        const n = currentEventIdx + step;
        if (n >= 0 && n < filteredData.length) selectEvent(n, true);
    }

    // (其餘 Panzoom, initResizers 等維持 V10.6.5 穩定版本邏輯)
    function initResizers() {
        const rMain = document.getElementById('resizer-main'), side = document.getElementById('side-panel');
        const rInner = document.getElementById('resizer-inner'), info = document.getElementById('info-area');
        let sY, sH;
        rMain.onmousedown = rMain.ontouchstart = (e) => {
            e.preventDefault();
            const sX = e.clientX || e.touches[0].clientX, sY = e.clientY || e.touches[0].clientY, sW = side.offsetWidth, sH = side.offsetHeight;
            window.onmousemove = window.ontouchmove = (ev) => {
                const x = ev.clientX || ev.touches[0].clientX, y = ev.clientY || ev.touches[0].clientY;
                if (window.innerHeight > window.innerWidth) side.style.flex = `0 0 ${Math.max(100, sH + (sY - y))}px`;
                else { side.style.flex = "none"; side.style.width = `${Math.max(200, sW + (sX - x))}px`; }
                syncOverlay(); updateMinScale(); refreshCollision();
            };
            window.onmouseup = window.ontouchend = () => window.onmousemove = window.ontouchmove = null;
        };
        rInner.onmousedown = rInner.ontouchstart = (e) => {
            e.preventDefault(); sY = e.clientY || e.touches[0].clientY; sH = info.offsetHeight;
            window.onmousemove = window.ontouchmove = (ev) => {
                const y = ev.clientY || ev.touches[0].clientY;
                info.style.flex = `0 0 ${Math.max(44, Math.min(sH + (y - sY), side.offsetHeight * 0.9))}px`;
            };
            window.onmouseup = window.ontouchend = () => window.onmousemove = window.ontouchmove = null;
        };
    }

    function applyMarkerStyles() {
        const s = pz ? pz.getScale() : 1;
        const anti = s > 1 ? 1 / s : 1;
        document.querySelectorAll('.marker').forEach(m => {
            m.querySelector('.label').style.fontSize = (13 + (parseInt(m.dataset.size)||0) * 1.5) + 'px';
            m.style.transform = `translate(-50%, -50%) scale(${anti})`;
        });
    }

    async function updateMapAndInfo(item) {
        let tidx = 1;
        const names = item.loc.split(/[+→]/).map(p => p.replace(/\(.*?\)/g, '').trim());
        for (let x = 15; x >= 1; x--) {
            const db = allCoords.filter(c => c.mapIdx === x);
            if (db.length && names.every(n => findBestMatch(n, db))) { tidx = x; break; }
        }
        if (currentMapIdx !== tidx) {
            currentMapIdx = tidx;
            const img = document.getElementById('bg-map');
            img.src = `${currentFolder}/picture-${tidx}.png`;
            await new Promise(res => img.onload = () => { syncOverlay(); updateMinScale(); res(); });
        }
        renderVisuals(allCoords.filter(c => c.mapIdx === tidx), parseLocationLogic(item.loc, allCoords.filter(c => c.mapIdx === tidx)));
        updateInfoPanel(item);
    }

    function updateInfoPanel(item) {
        document.getElementById('info-area').style.display = 'flex';
        document.getElementById('info-title').innerText = item.event;
        document.getElementById('info-time').innerText = item.time;
        document.getElementById('info-path').innerText = `地點：${item.loc}`;
        document.getElementById('info-script').innerText = item.script;
        document.getElementById('info-note').innerText = item.note;
    }

    function toggleInfo() {
        const b = document.getElementById('info-body'), a = document.getElementById('info-arrow'), r = document.getElementById('info-area');
        if (b.style.display === 'none') { b.style.display = 'block'; r.style.flex = "0 0 45%"; a.innerText = '▼'; }
        else { b.style.display = 'none'; r.style.flex = "0 0 44px"; a.innerText = '▲'; }
    }

    function renderTable(data) {
        const b = document.getElementById('table-body'); b.innerHTML = '';
        data.forEach((d, i) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td width="40">${d.id}</td><td>${d.event}</td>`;
            tr.onclick = () => selectEvent(i);
            b.appendChild(tr);
        });
    }

    function parseCSV(t) {
        const rows = []; let row = [], cell = '', q = false;
        for (let i = 0; i < t.length; i++) {
            let c = t[i], n = t[i+1];
            if (c === '"' && q && n === '"') { cell += '"'; i++; }
            else if (c === '"') q = !q;
            else if (c === ',' && !q) { row.push(cell.trim()); cell = ''; }
            else if ((c === '\n' || c === '\r') && !q) {
                if (row.length > 0 || cell) { row.push(cell.trim()); rows.push(row); }
                row = []; cell = ''; if (c === '\r' && n === '\n') i++;
            } else cell += c;
        }
        if (row.length > 0 || cell) { row.push(cell.trim()); rows.push(row); }
        return rows;
    }

    function findBestMatch(t, db) {
        let b = null, m = Infinity;
        for (const i of db) {
            if (i.n === t) return i;
            if (i.n.includes(t) || t.includes(i.n)) { let d = Math.abs(i.n.length - t.length); if (d < m) { m = d; b = i; } }
        }
        return b;
    }

    function parseLocationLogic(l, db) {
        const r = { paths: [], points: [] };
        l.split('+').forEach(b => {
            if (b.includes('→')) {
                const c = b.split('→').map(p => findBestMatch(p.replace(/\(.*?\)/g, '').trim(), db)).filter(p => p);
                if (c.length > 1) r.paths.push(c);
                c.forEach(p => r.points.push(p));
            } else {
                const pt = findBestMatch(b.replace(/\(.*?\)/g, '').trim(), db);
                if (pt) r.points.push(pt);
            }
        });
        return r;
    }

    function syncOverlay() { const img = document.getElementById('bg-map'), ov = document.getElementById('overlay-container'); ov.style.width = img.offsetWidth + 'px'; ov.style.height = img.offsetHeight + 'px'; }
    function updateMinScale() { const img = document.getElementById('bg-map'), c = document.getElementById('map-section'); if (!img.offsetWidth) return; const min = Math.max(c.clientWidth / img.offsetWidth, c.clientHeight / img.offsetHeight); pz.setOptions({ minScale: min }); if (pz.getScale() < min) pz.zoom(min); }
    function flyTo(pts) { const img = document.getElementById('bg-map'), c = document.getElementById('map-section'); if (!img.offsetWidth) return; let tx = 0, ty = 0; pts.forEach(p => { tx += parseFloat(p.x); ty += parseFloat(p.y); }); const px = (tx/pts.length/100)*img.offsetWidth, py = (ty/pts.length/100)*img.offsetHeight, sc = pz.getScale(); pz.pan((c.clientWidth/2)/sc - px, (c.clientHeight/2)/sc - py, { animate: true }); }
    function resetView() { pz.reset(); applyMarkerStyles(); refreshCollision(); }

    window.onload = async () => {
        const el = document.getElementById('panzoom-element');
        pz = Panzoom(el, { maxScale: 8, contain: 'outside' });
        el.addEventListener('panzoomchange', () => { applyMarkerStyles(); refreshCollision(); });
        document.getElementById('map-section').addEventListener('wheel', pz.zoomWithWheel);
        const res = await fetch(`folder.csv?t=${Date.now()}`);
        const folders = parseCSV(await res.text()).slice(1);
        const sel = document.getElementById('folder-select');
        sel.innerHTML = '<option value="">-- 請選擇 --</option>';
        folders.forEach(f => { if(f[0]) { const o = document.createElement('option'); o.value = f[0]; o.innerText = f[1] || f[0]; sel.appendChild(o); } });
        const last = localStorage.getItem('lastBibleFolder');
        if (last) { sel.value = last; loadProject(last); }
        initResizers();
    };
</script>
</body>
</html>
