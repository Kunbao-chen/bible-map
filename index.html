<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>亞伯拉罕史地互動地圖 V5.3</title>
    <script src="https://unpkg.com/@panzoom/panzoom@4.5.1/dist/panzoom.min.js"></script>
    <style>
        :root { --gold: #c5a059; --dark: #2c3e50; }
        * { box-sizing: border-box; font-family: "微軟正黑體", sans-serif; }
        body { margin: 0; padding: 0; display: flex; height: 100vh; overflow: hidden; background: #111; }

        /* 主容器 */
        #app-container { display: flex; width: 100%; height: 100%; }
        
        /* 地圖區域 */
        #map-section { flex: 1; position: relative; overflow: hidden; background: #1a1a1a; cursor: grab; }
        #panzoom-element { display: inline-block; transform-origin: 0 0; }
        #bg-map { display: block; max-width: none; }
        #overlay-container { position: absolute; pointer-events: none; top: 0; left: 0; width: 100%; height: 100%; }
        
        /* 地圖按鈕 - 修正超框問題 */
        .map-controls { position: absolute; bottom: 20px; left: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 8px; }
        .map-controls button { width: 42px; height: 42px; border-radius: 8px; border: 1px solid #ccc; background: rgba(255,255,255,0.9); cursor: pointer; font-size: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

        /* 側邊欄區域 */
        #side-panel { width: 360px; background: #fff; display: flex; flex-direction: column; border-left: 4px solid var(--gold); z-index: 500; }
        
        /* 1. 資訊顯示區 (固定在頂部) */
        #info-panel { background: #f9f9f9; border-bottom: 2px solid #eee; display: none; flex-direction: column; }
        #info-header { padding: 12px; background: var(--dark); color: white; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        #info-content { padding: 15px; font-size: 14px; line-height: 1.6; max-height: 400px; overflow-y: auto; }

        /* 2. 清單容器 (自動佔滿剩餘空間) */
        #list-container { flex: 1; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f1f1f1; position: sticky; top: 0; padding: 10px; text-align: left; font-size: 13px; z-index: 10; border-bottom: 2px solid #ddd; }
        td { padding: 12px 10px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 14px; }
        tr:hover { background: #f5f5f5; }
        tr.active-row td { background: #fff9c4; font-weight: bold; border-left: 5px solid var(--gold); }

        /* 標記樣式 */
        .marker { position: absolute; transform: translate(-50%, -50%); padding: 3px 8px; border-radius: 12px; font-size: 12px; font-weight: bold; background: white; border: 1px solid #777; white-space: nowrap; pointer-events: auto; z-index: 10; }
        .marker.highlight { background: var(--gold); color: white; z-index: 100; box-shadow: 0 0 10px var(--gold); }

        /* 手機版適應 */
        @media (max-width: 768px) {
            #app-container { flex-direction: column-reverse; }
            #side-panel { width: 100%; height: 45%; border-left: none; border-top: 4px solid var(--gold); }
            #info-content { max-height: 150px; }
        }
    </style>
</head>
<body>

<div id="app-container">
    <div id="map-section">
        <div id="panzoom-element">
            <img src="Abraham_2_Cute.png" id="bg-map">
            <div id="overlay-container">
                <svg id="svg-layer" style="position:absolute; width:100%; height:100%;"></svg>
                <div id="marker-layer"></div>
            </div>
        </div>
        <div class="map-controls">
            <button onclick="pz.zoomIn()">+</button>
            <button onclick="pz.zoomOut()">-</button>
            <button onclick="resetView()">↺</button>
        </div>
    </div>

    <div id="side-panel">
        <div id="info-panel">
            <div id="info-header" onclick="toggleInfo()">
                <span id="header-title">📜 事件詳情</span>
                <span>▼</span>
            </div>
            <div id="info-content">
                <div id="info-time" style="color:#888; font-size:12px;"></div>
                <h3 id="info-title" style="margin:5px 0 10px 0; color:var(--gold);"></h3>
                <div id="info-path" style="background:#eee; padding:8px; border-radius:4px; margin-bottom:10px;"></div>
                <p><strong>經文：</strong><span id="info-script"></span></p>
                <div id="info-note" style="border-top:1px solid #ddd; padding-top:10px; color:#444;"></div>
            </div>
        </div>
        
        <div id="list-container">
            <table>
                <thead><tr><th width="40">#</th><th>聖經關鍵事件</th></tr></thead>
                <tbody id="table-body"></tbody>
                <tfoot>
                    <tr style="height: 150px; pointer-events: none;"><td></td><td></td></tr>
                </tfoot>
            </table>
        </div>
    </div>
</div>

<script>
    let pz, eventData = [], coordsSmall = {}, coordsLarge = {};
    let currentMap = 'small';

    async function loadData() {
        const t = Date.now();
        try {
            const [s, l, d] = await Promise.all([
                fetch(`小圖座標.csv?t=${t}`).then(r => r.text()),
                fetch(`大圖座標.csv?t=${t}`).then(r => r.text()),
                fetch(`data.csv?t=${t}`).then(r => r.text())
            ]);

            // 解析座標庫
            parseCSV(s).forEach(r => { if(r[1]) coordsSmall[r[1].trim()] = {x:r[5], y:r[6]}; });
            parseCSV(l).forEach(r => { if(r[1]) coordsLarge[r[1].trim()] = {x:r[5], y:r[6]}; });

            // 解析並生成事件
            const tbody = document.getElementById('table-body');
            eventData = parseCSV(d).slice(1).filter(r => r.length > 2).map((r, i) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${r[0]||''}</td><td>${r[2]||''}</td>`;
                tr.onclick = () => selectEvent(i, tr);
                tbody.appendChild(tr);
                return { id:r[0], time:r[1], event:r[2], loc:r[3], script:r[4], note:r[5] };
            });

            // 初始化地圖
            const mapImg = document.getElementById('bg-map');
            if(mapImg.complete) syncOverlay(); else mapImg.onload = syncOverlay;
        } catch(e) { console.error("資料載入失敗", e); }
    }

    function selectEvent(idx, tr) {
        document.querySelectorAll('tr').forEach(r => r.classList.remove('active-row'));
        tr.classList.add('active-row');
        const item = eventData[idx];

        // 地圖切換邏輯 (與 V5.0 相同)
        const rawLocs = item.loc.split('→').map(p => p.replace(/\(.*?\)/g, '').trim()).filter(p=>p);
        let needLarge = rawLocs.some(p => !coordsSmall[p] && coordsLarge[p]);
        
        if(currentMap !== (needLarge?'large':'small')) {
            currentMap = needLarge?'large':'small';
            document.getElementById('bg-map').src = needLarge ? 'Abraham_1_Cute.png' : 'Abraham_2_Cute.png';
            document.getElementById('bg-map').onload = () => { syncOverlay(); updateMapItems(item, rawLocs); };
        } else {
            updateMapItems(item, rawLocs);
        }
        
        updateInfoPanel(item);
    }

    function updateMapItems(item, rawLocs) {
        const db = currentMap === 'large' ? coordsLarge : coordsSmall;
        const actives = rawLocs.map(p => {
            // 模糊匹配邏輯
            if(db[p]) return {x:db[p].x, y:db[p].y, name:p};
            for(let key in db) { if(p.includes(key)) return {x:db[key].x, y:db[key].y, name:p}; }
            return null;
        }).filter(p=>p);

        renderMarkers(actives);
        if(actives.length) flyTo(actives);
    }

    function updateInfoPanel(item) {
        document.getElementById('info-panel').style.display = 'flex';
        document.getElementById('info-title').innerText = item.event;
        document.getElementById('info-time').innerText = item.time;
        document.getElementById('info-path').innerText = `地點：${item.loc}`;
        document.getElementById('info-script').innerText = item.script;
        document.getElementById('info-note').innerText = item.note;
    }

    function toggleInfo() {
        const content = document.getElementById('info-content');
        content.style.display = (content.style.display === 'none') ? 'block' : 'none';
    }

    function renderMarkers(actives) {
        const ml = document.getElementById('marker-layer'), sl = document.getElementById('svg-layer');
        ml.innerHTML = ''; sl.innerHTML = '';
        const db = currentMap === 'large' ? coordsLarge : coordsSmall;

        // 畫路徑線
        if(actives.length > 1) {
            for(let i=0; i<actives.length-1; i++) {
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', actives[i].x+'%'); line.setAttribute('y1', actives[i].y+'%');
                line.setAttribute('x2', actives[i+1].x+'%'); line.setAttribute('y2', actives[i+1].y+'%');
                line.setAttribute('stroke', '#e74c3c'); line.setAttribute('stroke-width', '3');
                line.setAttribute('stroke-dasharray', '5,5');
                sl.appendChild(line);
            }
        }

        // 畫所有座標點
        Object.keys(db).forEach(name => {
            const isTarget = actives.some(a => a.name.includes(name));
            const div = document.createElement('div');
            div.className = isTarget ? 'marker highlight' : 'marker';
            div.style.left = db[name].x + '%';
            div.style.top = db[name].y + '%';
            div.innerText = name;
            ml.appendChild(div);
        });
    }

    function parseCSV(text) {
        const rows = [];
        let row = [], cell = '', inQuotes = false;
        for (let i = 0; i < text.length; i++) {
            let char = text[i], next = text[i+1];
            if (char === '"' && inQuotes && next === '"') { cell += '"'; i++; }
            else if (char === '"') { inQuotes = !inQuotes; }
            else if (char === ',' && !inQuotes) { row.push(cell.trim()); cell = ''; }
            else if ((char === '\n' || char === '\r') && !inQuotes) {
                if (row.length > 0 || cell) { row.push(cell.trim()); rows.push(row); }
                row = []; cell = ''; if (char === '\r' && next === '\n') i++;
            } else { cell += char; }
        }
        if (row.length > 0 || cell) { row.push(cell.trim()); rows.push(row); }
        return rows;
    }

    function syncOverlay() {
        const img = document.getElementById('bg-map');
        const ov = document.getElementById('overlay-container');
        ov.style.width = img.clientWidth + 'px'; ov.style.height = img.clientHeight + 'px';
    }

    function flyTo(pts) {
        let sx=0, sy=0;
        pts.forEach(p => { sx += parseFloat(p.x); sy += parseFloat(p.y); });
        const tx = (sx/pts.length/100)*document.getElementById('bg-map').clientWidth;
        const ty = (sy/pts.length/100)*document.getElementById('bg-map').clientHeight;
        const sc = pz.getScale();
        pz.pan((document.getElementById('map-section').offsetWidth/2)-(tx*sc), (document.getElementById('map-section').offsetHeight/2)-(ty*sc), {animate:true});
    }

    function resetView() { pz.reset(); }

    window.onload = () => {
        pz = Panzoom(document.getElementById('panzoom-element'), { maxScale: 5, minScale: 0.1, contain: 'outside' });
        document.getElementById('map-section').addEventListener('wheel', pz.zoomWithWheel);
        loadData();
    };
</script>
</body>
</html>
