<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>聖經地理 V8.2 - 路徑修正版</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; display: flex; height: 100vh; font-family: "Microsoft JhengHei", sans-serif; }
        #sidebar { width: 380px; display: flex; flex-direction: column; border-right: 1px solid #ccc; }
        #controls { padding: 15px; background: #eee; }
        #event-list { flex-grow: 1; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; cursor: pointer; }
        tr:hover { background-color: #f5f5f5; }
        tr.active { background-color: #d1ecf1; }
        #map-container { flex-grow: 1; position: relative; }
        #map { height: 100%; }
        /* 恢復可拖動面板樣式 */
        #info-panel {
            position: absolute; top: 50px; left: 50px; width: 300px;
            background: white; border: 2px solid #333; border-radius: 8px;
            z-index: 1000; cursor: move; box-shadow: 3px 3px 10px rgba(0,0,0,0.3);
        }
        #info-header { padding: 10px; background: #333; color: white; display: flex; justify-content: space-between; border-radius: 5px 5px 0 0; }
        #info-body { padding: 15px; max-height: 400px; overflow-y: auto; }
        .reset-btn { position: absolute; top: 10px; right: 10px; z-index: 1000; padding: 8px 12px; background: white; border: 1px solid #ccc; cursor: pointer; }
    </style>
</head>
<body>

<div id="sidebar">
    <div id="controls">
        <select id="folder-select" style="width:100%; margin-bottom:10px;"></select>
        <input type="text" id="search" placeholder="搜尋事件或地點..." style="width:100%; padding:5px;">
    </div>
    <div id="event-list">
        <table>
            <thead><tr><th>序號</th><th>關鍵事件內容</th></tr></thead>
            <tbody id="event-table-body"></tbody>
        </table>
    </div>
</div>

<div id="map-container">
    <button class="reset-btn" onclick="resetView()">還原視角</button>
    <div id="map"></div>
    <div id="info-panel">
        <div id="info-header"><span id="info-title">點擊事件查看詳情</span><span onclick="this.parentElement.parentElement.style.display='none'" style="cursor:pointer">✖</span></div>
        <div id="info-body"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<script>
    let map, imageOverlay;
    let masterData = [];
    let currentCoords = {};
    let currentFolder = "";

    // 1. 初始化地圖與資料夾
    async function init() {
        map = L.map('map', { crs: L.CRS.Simple, minZoom: -2 });
        
        // 讀取 folder.csv
        const fRes = await fetch('folder.csv');
        const fText = await fRes.text();
        const folders = Papa.parse(fText.trim(), { header: true }).data;
        
        const select = document.getElementById('folder-select');
        folders.forEach(f => {
            let opt = document.createElement('option');
            opt.value = f.folder_name;
            opt.textContent = f.display_name;
            select.appendChild(opt);
        });

        select.onchange = () => loadData(select.value);
        loadData(select.value); // 初始載入第一個
        makeDraggable(document.getElementById("info-panel"));
    }

    // 2. 載入指定資料夾的內容
    async function loadData(folder) {
        currentFolder = folder;
        // 清除舊地圖與標記
        if (imageOverlay) map.removeLayer(imageOverlay);
        clearMarkers();

        // 載入事件資料
        const res = await fetch(`${folder}/data.csv`);
        const text = await res.text();
        masterData = Papa.parse(text.trim(), { header: true }).data;

        // 預載座標 (這裡假設您依然使用 coords_1.csv 對應 picture_1.png)
        // 為了 8.2 的簡潔，我們在切換事件時才去讀取對應的座標檔
        renderTable(masterData);
    }

    function renderTable(data) {
        const tbody = document.getElementById('event-table-body');
        tbody.innerHTML = '';
        data.forEach((row, index) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${row['序號']}</td><td>${row['關鍵事件內容']}</td>`;
            tr.onclick = () => selectEvent(row);
            tbody.appendChild(tr);
        });
    }

    async function selectEvent(row) {
        // 更新資訊面板
        document.getElementById('info-panel').style.display = 'block';
        document.getElementById('info-title').innerText = `序號 ${row['序號']}`;
        document.getElementById('info-body').innerHTML = `<b>地點：</b>${row['地點 (距離)']}<br><br>${row['備註 (關聯、釋義、補充)']}`;

        // 決定載入哪張地圖 (簡單判斷：優先看有沒有對應的圖，預設用 1)
        // 您可以根據需要在此處加入更複雜的地圖切換邏輯
        showMap(1, row['地點 (距離)']);
    }

    async function showMap(mapId, locationStr) {
        const imgPath = `${currentFolder}/picture_${mapId}.png`;
        const coordPath = `${currentFolder}/coords_${mapId}.csv`;

        const img = new Image();
        img.onload = async function() {
            const bounds = [[0, 0], [img.height, img.width]];
            if (imageOverlay) map.removeLayer(imageOverlay);
            imageOverlay = L.imageOverlay(imgPath, bounds).addTo(map);
            
            // 讀取座標並標註
            const cRes = await fetch(coordPath);
            const cText = await cRes.text();
            const coords = Papa.parse(cText.trim(), { header: true }).data;
            
            clearMarkers();
            
            // 找出 CSV 裡匹配的地點
            let targetPoint = null;
            coords.forEach(c => {
                if (locationStr.includes(c['地名'])) {
                    const x = parseFloat(c['百分比X']);
                    const y = parseFloat(c['百分比Y']);
                    const marker = L.marker([y, x]).addTo(map).bindTooltip(c['地名'], {permanent: true});
                    targetPoint = [y, x];
                }
            });

            // 如果有找到點，則平移過去，但「不改變縮放倍率」
            if (targetPoint) {
                map.panTo(targetPoint); 
            } else {
                map.fitBounds(bounds);
            }
        };
        img.src = imgPath;
    }

    function resetView() {
        if (imageOverlay) map.fitBounds(imageOverlay.getBounds());
    }

    function clearMarkers() {
        map.eachLayer(layer => {
            if (layer instanceof L.Marker) map.removeLayer(layer);
        });
    }

    // 恢復可拖動邏輯
    function makeDraggable(el) {
        let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
        const header = document.getElementById("info-header");
        header.onmousedown = (e) => {
            e.preventDefault();
            pos3 = e.clientX; pos4 = e.clientY;
            document.onmouseup = () => { document.onmouseup = null; document.onmousemove = null; };
            document.onmousemove = (e) => {
                e.preventDefault();
                pos1 = pos3 - e.clientX; pos2 = pos4 - e.clientY;
                pos3 = e.clientX; pos4 = e.clientY;
                el.style.top = (el.offsetTop - pos2) + "px";
                el.style.left = (el.offsetLeft - pos1) + "px";
            };
        };
    }

    init();
</script>
</body>
</html>
