<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>亞伯拉罕史地互動地圖 V5.8</title>
    <script src="https://unpkg.com/@panzoom/panzoom@4.5.1/dist/panzoom.min.js"></script>
    <style>
        :root { --gold: #c5a059; --dark: #2c3e50; --handle-bg: #bbb; --safe-top: env(safe-area-inset-top); }
        * { box-sizing: border-box; font-family: "微軟正黑體", sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* 使用 dvh 解決手機網址列遮擋問題 */
        body { margin: 0; padding: 0; width: 100vw; height: 100dvh; overflow: hidden; background: #111; }
        #app-container { display: flex; width: 100%; height: 100%; flex-direction: row; }
        
        /* 手機直式：確保資訊區不被頂出去 */
        @media (max-width: 800px) and (orientation: portrait) { 
            #app-container { flex-direction: column; } 
            #side-panel { width: 100% !important; flex: 0 0 50%; height: 50%; } /* 固定初始比例 */
        }

        #map-section { flex: 1; position: relative; overflow: hidden; background: #1a1a1a; }
        #panzoom-element { display: inline-block; transform-origin: 0 0; }
        #bg-map { display: block; max-width: none; }
        
        /* 按鈕稍微移開邊緣，避免被系統手勢遮擋 */
        .map-controls { position: absolute; left: 15px; bottom: 45px; z-index: 1000; display: flex; flex-direction: column; gap: 10px; }
        .map-controls button { width: 40px; height: 40px; border-radius: 8px; border: 1px solid #999; background: rgba(255,255,255,0.9); font-size: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }

        /* 拉桿：加大觸控區域 */
        #resizer { background: var(--handle-bg); z-index: 1100; display: flex; align-items: center; justify-content: center; touch-action: none; position: relative; }
        @media (min-width: 801px), (orientation: landscape) { #resizer { width: 14px; cursor: col-resize; height: 100%; border-left: 1px solid #888; } #resizer::after { content: "⋮"; font-weight: bold; } }
        @media (max-width: 800px) and (orientation: portrait) { #resizer { height: 20px; cursor: row-resize; width: 100%; border-top: 1px solid #888; } #resizer::after { content: "⋯"; font-weight: bold; } }

        #side-panel { width: 360px; background: white; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 0 15px rgba(0,0,0,0.5); }

        /* 資訊區 Header：使用 Sticky 確保永遠在頂部 */
        #info-area { display: none; flex-direction: column; background: #fff; flex-shrink: 0; border-bottom: 3px solid #ddd; }
        #info-header { 
            position: sticky; top: 0; z-index: 10;
            padding: 10px 15px; background: var(--dark); color: white; 
            display: flex; justify-content: space-between; align-items: center;
        }
        .nav-btns { display: flex; gap: 8px; }
        .nav-btns button { background: var(--gold); border: none; color: white; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: bold; }
        .nav-btns button:disabled { background: #777; opacity: 0.5; }

        #info-body { padding: 15px; overflow-y: auto; font-size: 15px; line-height: 1.6; max-height: 45vh; }
        .info-title { color: var(--gold); margin: 0 0 5px 0; font-size: 19px; border-left: 4px solid var(--gold); padding-left: 10px; }

        #list-container { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f0f0f0; position: sticky; top: 0; padding: 12px; text-align: left; z-index: 5; font-size: 14px; }
        td { padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 14px; }
        tr.active-row td { background: #fff9c4; font-weight: bold; border-left: 5px solid var(--gold); }
        .spacer { height: 100px; }

        .marker { position: absolute; transform: translate(-50%, -50%); padding: 2px 6px; border-radius: 8px; font-size: 11px; font-weight: bold; background: rgba(255,255,255,0.85); border: 1px solid #666; white-space: nowrap; pointer-events: none; }
        .marker.highlight { background: var(--gold); color: white; border-color: #fff; z-index: 1000 !important; font-size: 14px; box-shadow: 0 0 10px var(--gold); opacity: 1 !important; visibility: visible !important; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="map-section">
        <div id="panzoom-element">
            <img src="Abraham_2_Cute.png" id="bg-map">
            <div id="overlay-container" style="position:absolute; top:0; left:0; pointer-events:none;">
                <svg id="svg-layer" style="position:absolute; width:100%; height:100%;"></svg>
                <div id="marker-layer"></div>
            </div>
        </div>
        <div class="map-controls">
            <button onclick="pz.zoomIn()">+</button>
            <button onclick="pz.zoomOut()">-</button>
            <button onclick="resetView()">↺</button>
        </div>
    </div>

    <div id="resizer"></div>

    <div id="side-panel">
        <div id="info-area">
            <div id="info-header">
                <div onclick="toggleInfo()" style="cursor:pointer; flex:1;">📜 詳情 <span id="info-arrow">▼</span></div>
                <div class="nav-btns">
                    <button id="btn-prev" onclick="navEvent(-1)">◀</button>
                    <button id="btn-next" onclick="navEvent(1)">▶</button>
                </div>
            </div>
            <div id="info-body">
                <div id="info-time" style="color:#888; font-size:12px;"></div>
                <h3 id="info-title" class="info-title"></h3>
                <div id="info-path" style="background:#f5f5f5; padding:8px; border-radius:4px; margin-bottom:10px; font-weight:bold;"></div>
                <p><strong>經文：</strong><span id="info-script" style="color:#2980b9;"></span></p>
                <div id="info-note" style="border-top:1px solid #eee; padding-top:10px; font-size:14px; color:#444;"></div>
            </div>
        </div>
        <div id="list-container">
            <table>
                <thead><tr><th width="50">序號</th><th>聖經關鍵事件</th></tr></thead>
                <tbody id="table-body"></tbody>
            </table>
            <div class="spacer"></div>
        </div>
    </div>
</div>

<script>
    let pz, eventData = [], coordsSmall = {}, coordsLarge = {};
    let currentMap = 'small', currentEventIdx = -1;
    let locationFrequency = {};

    // === 核心修正 1：FlyTo 強化版 (解決最小縮放無法置中問題) ===
    function flyTo(pts) {
        if (!pts.length) return;
        const img = document.getElementById('bg-map'), mapSection = document.getElementById('map-section');
        
        let sx=0, sy=0; pts.forEach(p => { sx += parseFloat(p.x); sy += parseFloat(p.y); });
        const targetX = (sx/pts.length/100) * img.naturalWidth;
        const targetY = (sy/pts.length/100) * img.naturalHeight;

        let scale = pz.getScale();
        // 如果目前縮放太小，會導致 contain:'outside' 限制位移，因此自動放大
        if (scale < 1.3) {
            pz.zoom(1.5, { animate: true });
            scale = 1.5;
        }

        const centerX = mapSection.offsetWidth / 2;
        const centerY = mapSection.offsetHeight / 2;

        // 計算偏移量，若無法置中，Panzoom 的 contain 規範會自動讓其停在邊緣，確保地點在視區內
        setTimeout(() => {
            pz.pan(centerX - (targetX * scale), centerY - (targetY * scale), { animate: true });
        }, 100);
    }

    // === 核心修正 2：優先權與碰撞邏輯 ===
    function renderMarkersWithPriority(db, actives) {
        const ml = document.getElementById('marker-layer'), sl = document.getElementById('svg-layer');
        ml.innerHTML = ''; sl.innerHTML = '';
        
        if (actives.length > 1) {
            for (let i = 0; i < actives.length - 1; i++) {
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', actives[i].x+'%'); line.setAttribute('y1', actives[i].y+'%');
                line.setAttribute('x2', actives[i+1].x+'%'); line.setAttribute('y2', actives[i+1].y+'%');
                line.setAttribute('stroke', '#e74c3c'); line.setAttribute('stroke-width', '3');
                sl.appendChild(line);
            }
        }

        const markerList = Object.keys(db).map(name => {
            const isA = actives.some(a => a.n === name);
            const score = (isA ? 100000 : 0) + (locationFrequency[name] || 0);
            const div = document.createElement('div');
            div.className = isA ? 'marker highlight' : 'marker';
            div.style.left = db[name].x + '%'; div.style.top = db[name].y + '%';
            div.innerText = name;
            div.style.visibility = 'hidden';
            ml.appendChild(div);
            return { el: div, score: score, active: isA };
        });

        markerList.sort((a, b) => b.score - a.score);

        setTimeout(() => {
            const occupied = [];
            markerList.forEach(item => {
                const rect = item.el.getBoundingClientRect();
                const overlap = occupied.some(r => !(rect.right < r.left || rect.left > r.right || rect.bottom < r.top || rect.top > r.bottom));
                if (item.active || !overlap) {
                    item.el.style.visibility = 'visible';
                    occupied.push(rect);
                } else {
                    item.el.style.display = 'none';
                }
            });
        }, 50);
    }

    // === 核心修正 3：Resizer 直式支援 ===
    const resizer = document.getElementById('resizer'), sidePanel = document.getElementById('side-panel');
    function initDrag(e) {
        e.preventDefault();
        const moveHandler = (m) => {
            const x = m.clientX || (m.touches ? m.touches[0].clientX : 0), y = m.clientY || (m.touches ? m.touches[0].clientY : 0);
            const isPortrait = window.innerHeight > window.innerWidth;
            if (isPortrait) {
                const newHeight = window.innerHeight - y;
                sidePanel.style.height = Math.max(100, newHeight) + 'px';
                sidePanel.style.flex = "0 0 " + sidePanel.style.height;
            } else {
                const newWidth = window.innerWidth - x;
                sidePanel.style.width = Math.max(200, newWidth) + 'px';
            }
            syncOverlay();
        };
        const endHandler = () => { window.removeEventListener('mousemove', moveHandler); window.removeEventListener('touchmove', moveHandler); };
        window.addEventListener('mousemove', moveHandler); window.addEventListener('touchmove', moveHandler, {passive:false});
        window.addEventListener('mouseup', endHandler); window.addEventListener('touchend', endHandler);
    }
    resizer.addEventListener('mousedown', initDrag); resizer.addEventListener('touchstart', initDrag, {passive:false});

    // === 其他邏輯 (導覽、資料處理) ===
    function navEvent(step) {
        let n = currentEventIdx + step;
        if (n >= 0 && n < eventData.length) {
            const row = document.getElementById('table-body').rows[n];
            selectEvent(n, row);
            row.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    }

    async function loadData() {
        const t = Date.now();
        const [s, l, d] = await Promise.all([
            fetch(`小圖座標.csv?t=${t}`).then(r => r.text()),
            fetch(`大圖座標.csv?t=${t}`).then(r => r.text()),
            fetch(`data.csv?t=${t}`).then(r => r.text())
        ]);
        parseCSV(s).forEach(r => { if(r[1]) coordsSmall[r[1].trim()] = {x:r[5], y:r[6]}; });
        parseCSV(l).forEach(r => { if(r[1]) coordsLarge[r[1].trim()] = {x:r[5], y:r[6]}; });
        const rows = parseCSV(d);
        rows.slice(1).forEach(r => {
            if (r[3]) r[3].split('→').forEach(n => {
                const name = n.replace(/\(.*?\)/g, '').trim();
                locationFrequency[name] = (locationFrequency[name] || 0) + 1;
            });
        });
        const tbody = document.getElementById('table-body');
        eventData = rows.slice(1).filter(r => r.length > 2).map((r, i) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${r[0]}</td><td>${r[2]}</td>`;
            tr.onclick = () => selectEvent(i, tr);
            tbody.appendChild(tr);
            return { id:r[0], time:r[1], event:r[2], loc:r[3], script:r[4], note:r[5] };
        });
        document.getElementById('bg-map').onload = syncOverlay;
        syncOverlay();
    }

    async function selectEvent(idx, tr) {
        currentEventIdx = idx;
        document.querySelectorAll('tr').forEach(r => r.classList.remove('active-row'));
        tr.classList.add('active-row');
        document.getElementById('btn-prev').disabled = idx === 0;
        document.getElementById('btn-next').disabled = idx === eventData.length - 1;

        const item = eventData[idx];
        const needLarge = item.loc.split('→').some(p => {
            const n = p.replace(/\(.*?\)/g, '').trim();
            return !!findInDB(n, coordsLarge) && !findInDB(n, coordsSmall);
        });

        if (currentMap !== (needLarge ? 'large' : 'small')) {
            currentMap = needLarge ? 'large' : 'small';
            document.getElementById('bg-map').src = needLarge ? 'Abraham_1_Cute.png' : 'Abraham_2_Cute.png';
            await new Promise(res => document.getElementById('bg-map').onload = res);
            syncOverlay();
        }

        const db = currentMap === 'large' ? coordsLarge : coordsSmall;
        const actives = item.loc.split('→').map(p => findInDB(p.replace(/\(.*?\)/g, '').trim(), db)).filter(p => p);

        renderMarkersWithPriority(db, actives);
        if (actives.length) flyTo(actives);
        updateInfoPanel(item);
    }

    function findInDB(name, db) {
        if (db[name]) return { ...db[name], n: name };
        for (let key in db) { if (name.includes(key) || key.includes(name)) return { ...db[key], n: key }; }
        return null;
    }

    function updateInfoPanel(item) {
        document.getElementById('info-area').style.display = 'flex';
        document.getElementById('info-title').innerText = item.event;
        document.getElementById('info-time').innerText = item.time;
        document.getElementById('info-path').innerText = `地點：${item.loc}`;
        document.getElementById('info-script').innerText = item.script;
        document.getElementById('info-note').innerText = item.note;
        document.getElementById('info-body').scrollTop = 0;
    }

    function toggleInfo() {
        const body = document.getElementById('info-body');
        body.style.display = body.style.display === 'none' ? 'block' : 'none';
        document.getElementById('info-arrow').innerText = body.style.display === 'none' ? '▲' : '▼';
    }

    function parseCSV(t) {
        const rows = []; let row = [], cell = '', q = false;
        for (let i = 0; i < t.length; i++) {
            let c = t[i], n = t[i+1];
            if (c === '"' && q && n === '"') { cell += '"'; i++; }
            else if (c === '"') q = !q;
            else if (c === ',' && !q) { row.push(cell.trim()); cell = ''; }
            else if ((c === '\n' || c === '\r') && !q) {
                if (row.length > 0 || cell) { row.push(cell.trim()); rows.push(row); }
                row = []; cell = ''; if (c === '\r' && n === '\n') i++;
            } else cell += c;
        }
        if (row.length > 0 || cell) { row.push(cell.trim()); rows.push(row); }
        return rows;
    }

    function syncOverlay() {
        const img = document.getElementById('bg-map'), ov = document.getElementById('overlay-container');
        ov.style.width = img.clientWidth + 'px'; ov.style.height = img.clientHeight + 'px';
    }

    function resetView() { pz.reset(); }

    window.onload = () => {
        pz = Panzoom(document.getElementById('panzoom-element'), { maxScale: 5, minScale: 0.1, contain: 'outside' });
        document.getElementById('map-section').addEventListener('wheel', pz.zoomWithWheel);
        loadData();
    };
</script>
</body>
</html>
