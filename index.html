<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>聖經史地互動地圖 V1.1.2</title>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@panzoom/panzoom@4.5.1/dist/panzoom.min.js"></script>
    <style>
        :root { 
            --gold: #c5a059; --dark: #2c3e50; --brown: #5d4037; --ink-blue: rgba(50, 75, 95, 0.6); --handle-bg: #ddd; 
            --base-fs: 14px; 
            --marker-fs: 13px; 
        }
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; width: 100vw; height: 100dvh; overflow: hidden; background: #fdf6e3; font-family: "微軟正黑體", "Heiti TC", "Apple LiGothic Medium", sans-serif; }
        #app-container { display: flex; width: 100%; height: 100%; flex-direction: row; }

        @media (max-width: 800px) and (orientation: portrait) { 
            #app-container { flex-direction: column; } 
            #side-panel { width: 100%; height: 33.33dvh; flex: none; } 
        }

        #map-section { flex: 1; position: relative; overflow: hidden; background: #e5d3b3; }
        #panzoom-element { display: inline-block; position: relative; }
        #bg-map { display: block; max-width: none; user-select: none; }

        .marker { position: absolute; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; z-index: 10; cursor: pointer; }
        .marker .dot { width: 5px; height: 5px; background: rgba(93,64,55,0.5); border-radius: 50%; z-index: 1; }
        /* 手術刀修正：標籤字體連結變數，達成解耦基礎 */
        .marker .label { margin-top: -12.5px; opacity: 0; padding: 2px 6px; border-radius: 8px; background: rgba(255,255,255,0.9); border: 1.5px solid var(--brown); white-space: nowrap; font-weight: bold; font-size: var(--marker-fs); color: var(--brown); transition: opacity 0.4s ease-in-out, transform 0.2s ease; pointer-events: none; z-index: 2; }
        .marker.region-type .label { background: none !important; border: none !important; font-family: 'ZCOOL KuaiLe', cursive; color: var(--ink-blue); text-shadow: 0 0 5px #fdf6e3, 0 0 2px #fdf6e3; }
        .marker.highlight { z-index: 1000 !important; }
        .marker.highlight .label { opacity: 1 !important; animation: labelBreathe 0.8s infinite alternate ease-in-out; background: #fffde7 !important; border: 2px solid #d32f2f !important; color: #d32f2f !important; pointer-events: auto !important; }
        @keyframes labelBreathe { from { transform: translateY(0) scale(1); } to { transform: translateY(-6px) scale(1.05); } }

        #side-panel { background: white; display: flex; flex-direction: column; overflow: hidden; position: relative; flex: 0 0 33.33%; flex-shrink: 0; }
        #info-area { display: none; flex-direction: column; background: #fff; flex: 0 0 45%; min-height: 44px; overflow: hidden; }
        #info-header { background: var(--dark); color: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; height: 44px; z-index: 5; }
        #info-body { padding: 15px; overflow-y: auto; flex: 1; font-size: var(--base-fs); }
        #list-container { flex: 1; overflow-y: auto; }
        #list-container table { font-size: var(--base-fs); width: 100%; border-collapse: collapse; }
        tr.active-row td { background: #fffde7; font-weight: bold; border-left: 5px solid var(--gold); }

        .fab-container { position: absolute; left: 12px; top: 12px; z-index: 2000; display: flex; flex-direction: column; gap: 8px; }
        .fab-main { width: 42px; height: 42px; background: rgba(255,255,255,0.4); backdrop-filter: blur(8px); border: 2px solid var(--brown); border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .fab-menu button { width: auto; min-width: 45px; height: 34px; padding: 0 8px; border-radius: 10px; border: 2px solid var(--brown); background: rgba(255,255,255,0.8); cursor: pointer; font-size: 12px; font-weight: bold; }

        #scripture-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 3000; background: rgba(0,0,0,0.5); }
        .modal-content { position: absolute; top: 5%; left: 5%; width: 90%; height: 90%; background: white; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; }
        .modal-header { background: var(--dark); color: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; }
        #scripture-frame { flex: 1; border: none; width: 100%; }
        .script-link { color: #2980b9; cursor: pointer; text-decoration: underline; font-weight: bold; }
        #resizer-main { background: var(--handle-bg); z-index: 1100; display: flex; align-items: center; justify-content: center; touch-action: none; }
        #resizer-inner { height: 12px; background: #eee; cursor: row-resize; display: flex; align-items: center; justify-content: center; touch-action: none; flex-shrink: 0; border-top: 1px solid #ddd; z-index: 10; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="map-section">
        <div class="fab-container">
            <button class="fab-main" onclick="toggleFab()">⚙️</button>
            <div id="fab-menu" style="display:none; flex-direction:column; gap:6px;">
                <button onclick="resetView()">重置地圖</button>
                <button onclick="adjustFontSize(1)">標籤 +</button>
                <button onclick="adjustFontSize(-1)">標籤 -</button>
                <button onclick="adjustFontSize(1)">內容 +</button>
                <button onclick="adjustFontSize(-1)">內容 -</button>
            </div>
        </div>
        <div id="panzoom-element">
            <img src="" id="bg-map">
            <div id="overlay-container" style="position:absolute; top:0; left:0; pointer-events:none;">
                <svg id="svg-layer" style="position:absolute; width:100%; height:100%;"></svg>
                <div id="marker-layer"></div>
            </div>
        </div>
    </div>
    <div id="resizer-main" style="width:12px;"></div>
    <div id="side-panel">
        <div id="folder-nav"><select id="folder-select" onchange="loadProject(this.value)" style="width:100%; padding:8px;"><option value="">載入中...</option></select></div>
        <div id="info-area">
            <div id="info-header" onclick="toggleInfo()"><div>📜 詳情 <span id="info-arrow">▼</span></div><div style="display:flex; gap:10px;"><button onclick="navEvent(-1); event.stopPropagation();">◀</button><button onclick="navEvent(1); event.stopPropagation();">▶</button></div></div>
            <div id="info-body">
                <div id="info-time" style="color:#888;"></div>
                <h3 id="info-title" style="color:var(--gold); margin:5px 0;"></h3>
                <div id="info-path" style="background:#f9f9f9; padding:8px; border-radius:4px; margin:5px 0; font-weight:bold;"></div>
                <p id="info-script"></p>
                <div id="info-note"></div>
            </div>
        </div>
        <div id="resizer-inner"></div>
        <div id="list-container"><table><tbody id="table-body"></tbody></table></div>
    </div>
</div>

<div id="scripture-modal">
    <div class="modal-content">
        <div class="modal-header"><span id="modal-title">經文閱讀</span><span onclick="closeScripture()" style="cursor:pointer; font-size:24px;">×</span></div>
        <iframe id="scripture-frame" src=""></iframe>
    </div>
</div>

<script>
    const SCRIPTURE_PHYSICAL_MAP = { 
        "創": "ot/gen", "出": "ot/ex", "利": "ot/lev", "民": "ot/num", "申": "ot/deut", "書": "ot/josh", "士": "ot/judg", "得": "ot/ruth", "撒上": "ot/1-sam", "撒下": "ot/2-sam", "王上": "ot/1-kgs", "王下": "ot/2-kgs", "代上": "ot/1-chr", "代下": "ot/2-chr", "拉": "ot/ezra", "尼": "ot/neh", "斯": "ot/esth", "伯": "ot/job", "詩": "ot/ps", "箴": "ot/prov", "傳": "ot/eccl", "歌": "ot/ss", "賽": "ot/isa", "耶": "ot/jer", "哀": "ot/lam", "結": "ot/ezek", "單": "ot/dan", "但": "ot/dan", "何": "ot/hos", "珥": "ot/joel", "摩": "ot/amos", "俄": "ot/obad", "拿": "ot/jonah", "彌": "ot/micah", "鴻": "ot/nahum", "哈": "ot/hab", "番": "ot/zeph", "該": "ot/hag", "亞": "ot/zech", "瑪": "ot/mal", 
        "太": "nt/matt", "可": "nt/mark", "路": "nt/luke", "約": "nt/john", "徒": "nt/acts", "羅": "nt/rom", "林前": "nt/1-cor", "林後": "nt/2-cor", "加": "nt/gal", "弗": "nt/eph", "腓": "nt/phil", "西": "nt/col", "帖前": "nt/1-thes", "帖後": "nt/2-thes", "提前": "nt/1-tim", "提後": "nt/2-tim", "多": "nt/titus", "門": "nt/philem", "來": "nt/heb", "雅": "nt/james", "彼前": "nt/1-pet", "彼後": "nt/2-pet", "約一": "nt/1-jn", "約二": "nt/2-jn", "約三": "nt/3-jn", "猶": "nt/jude", "啟": "nt/rev"
    };

    let pz, eventData = [], filteredData = [], allCoords = [], currentFolder = '', currentMapIdx = -1, currentEventIdx = -1, baseMarkerFontSize = 13, baseListFontSize = 14;
    let lastPortraitHeight = "33.33dvh", lastLandscapeWidth = "33.33%";

    // 手術刀修正：邏輯層分流，斷開標籤與內容的連動
    function adjustFontSize(delta) { 
        const btnText = window.event.target.innerText;
        if (btnText.includes('標籤')) {
            baseMarkerFontSize = Math.max(8, Math.min(30, baseMarkerFontSize + delta)); 
            document.documentElement.style.setProperty('--marker-fs', baseMarkerFontSize + 'px'); 
            applyMarkerStyles(); 
        } else {
            baseListFontSize = Math.max(8, Math.min(30, baseListFontSize + delta)); 
            document.documentElement.style.setProperty('--base-fs', baseListFontSize + 'px'); 
        }
    }

    function openScripture(bookKey, chap, sec, endSec) {
        const path = SCRIPTURE_PHYSICAL_MAP[bookKey];
        const c = chap || "1";
        let url = path ? `https://www.churchofjesuschrist.org/study/scriptures/${path}/${c}?lang=zho` : `https://bible.fhl.net/new/read.php?chineses=${encodeURIComponent(bookKey)}&chap=${c}`;
        if (path && sec) url += `&id=${endSec ? 'p'+sec+'-p'+endSec : 'p'+sec}#p${sec}`;
        document.getElementById('scripture-frame').src = url;
        document.getElementById('scripture-modal').style.display = 'block';
        document.getElementById('modal-title').innerText = `${bookKey} ${c}`;
    }
    function closeScripture() { document.getElementById('scripture-modal').style.display = 'none'; document.getElementById('scripture-frame').src = ''; }

    function updateInfoPanel(item) {
        if(!item) return;
        document.getElementById('info-area').style.display = 'flex';
        document.getElementById('info-title').innerText = item.event;
        document.getElementById('info-time').innerText = item.time;
        document.getElementById('info-path').innerText = `地點：${item.loc}`;
        
        // 手術刀修正：Regex 加入長度降序排序與全形空格支持
        const sortedBooks = Object.keys(SCRIPTURE_PHYSICAL_MAP).sort((a,b) => b.length - a.length).join('|');
        const regex = new RegExp(`(${sortedBooks})[\\s\\u3000]*(\\d+)(?::(\\d+)(?:-(\\d+))?)?`, 'g');
        const wrap = (m, b, c, s, e) => `<span class="script-link" onclick="openScripture('${b}','${c}','${s||""}','${e||""}')">${m}</span>`;
        
        document.getElementById('info-script').innerHTML = (item.script || "").replace(regex, wrap);
        document.getElementById('info-note').innerHTML = (item.note || "").replace(regex, wrap);
    }

    function toggleFab() { const m = document.getElementById('fab-menu'); m.style.display = m.style.display === 'none' ? 'flex' : 'none'; }
    function resetView() { pz.reset(); applyMarkerStyles(); refreshCollision(); }
    function applyMarkerStyles() {
        const s = pz ? pz.getScale() : 1;
        document.querySelectorAll('.marker').forEach(m => {
            const gain = parseInt(m.dataset.size)||0;
            const label = m.querySelector('.label');
            if(label) label.style.fontSize = (baseMarkerFontSize + (gain*1.5)) + 'px';
            m.style.transform = `translate(-50%, -50%) scale(${1/s})`;
        });
    }
    function parseCSV(t){const rows=[];let row=[],cell='',q=false;for(let i=0;i<t.length;i++){let c=t[i],n=t[i+1];if(c==='"'&&q&&n==='"'){cell+='"';i++}else if(c==='"')q=!q;else if(c===','&&!q){row.push(cell.trim());cell=''}else if((c==='\n'||c==='\r')&&!q){if(row.length>0||cell){row.push(cell.trim());rows.push(row)}row=[];cell='';if(c==='\r'&&n==='\n')i++}else cell+=c}if(row.length>0||cell){row.push(cell.trim());rows.push(row)}return rows}
    async function loadProject(f){if(!f)return;currentFolder=f;localStorage.setItem('lastBibleFolder',f);const d=await fetch(`${f}/data.csv?t=${Date.now()}`);eventData=parseCSV(await d.text()).slice(1).filter(r=>r.length>2).map(r=>({id:r[0],time:r[1],event:r[2],loc:r[3],script:r[4],note:r[5]}));filteredData=[...eventData];renderTable();allCoords=[];for(let x=1;x<=15;x++){const c=await fetch(`${f}/coords-${x}.csv`).catch(()=>null);if(!c||!c.ok)break;parseCSV(await c.text()).slice(1).forEach(r=>{if(r[1])allCoords.push({n:r[1],x:r[5],y:r[6],mapIdx:x,size:parseInt(r[7])||0})})}if(filteredData.length)selectEvent(0)}
    function renderTable(){const b=document.getElementById('table-body');b.innerHTML='';filteredData.forEach((item,i)=>{const tr=document.createElement('tr');tr.innerHTML=`<td width="40" style="padding:10px;">${item.id}</td><td style="padding:10px;">${item.event}</td>`;tr.onclick=()=>selectEvent(i);b.appendChild(tr)})}
    function selectEvent(idx){currentEventIdx=idx;const item=filteredData[idx];Array.from(document.getElementById('table-body').rows).forEach((r,i)=>r.className=i===idx?'active-row':'');updateMapAndInfo(item)}
    async function updateMapAndInfo(item){let targetMapIdx=1;const names=item.loc.split(/[+→]/).map(p=>p.trim());for(let x=15;x>=1;x--){const db=allCoords.filter(c=>c.mapIdx===x);if(db.length&&names.every(n=>db.find(d=>d.n.includes(n)||n.includes(d.n)))){targetMapIdx=x;break}}if(currentMapIdx!==targetMapIdx){currentMapIdx=targetMapIdx;const img=document.getElementById('bg-map');img.src=`${currentFolder}/picture-${targetMapIdx}.png`;await new Promise(r=>img.onload=r);syncOverlay();updateMinScale()}updateInfoPanel(item);renderMarkers(allCoords.filter(c=>c.mapIdx===targetMapIdx),item.loc)}
    function renderMarkers(db,loc){const ml=document.getElementById('marker-layer');ml.innerHTML='';db.forEach(d=>{const isH=loc.includes(d.n);const m=document.createElement('div');m.className=`marker ${isH?'highlight':''} ${d.size>2?'region-type':''}`;m.dataset.size=d.size;m.style.left=d.x+'%';m.style.top=d.y+'%';m.innerHTML=`<div class="dot"></div><div class="label">${d.n}</div>`;ml.appendChild(m)});applyMarkerStyles();refreshCollision()}
    function syncOverlay(){const i=document.getElementById('bg-map'),o=document.getElementById('overlay-container');o.style.width=i.offsetWidth+'px';o.style.height=i.offsetHeight+'px'}
    function updateMinScale(){const i=document.getElementById('bg-map'),c=document.getElementById('map-section');const min=Math.max(c.clientWidth/i.offsetWidth,c.clientHeight/i.offsetHeight);pz.setOptions({minScale:min});pz.zoom(min,{animate:false})}
    function refreshCollision(){const labels=Array.from(document.querySelectorAll('.marker:not(.highlight) .label'));const occupied=[];labels.forEach(l=>{const r=l.getBoundingClientRect();if(occupied.some(o=>!(r.right<o.left||r.left>o.right||r.bottom<o.top||r.top>o.bottom))){l.style.opacity=0}else{l.style.opacity=1;occupied.push(r)}});document.querySelectorAll('.highlight .label').forEach(l=>l.style.opacity=1)}
    function toggleInfo(){const b=document.getElementById('info-body'),a=document.getElementById('info-arrow');const isH=b.style.display==='none';b.style.display=isH?'block':'none';a.innerText=isH?'▼':'▲';document.getElementById('info-area').style.flex=isH?'0 0 45%':'0 0 44px'}
    function navEvent(s){const n=currentEventIdx+s;if(n>=0&&n<filteredData.length)selectEvent(n)}

    function initResizers() {
        const resMain=document.getElementById('resizer-main'), side=document.getElementById('side-panel'), resInner=document.getElementById('resizer-inner');
        resMain.onmousedown=resMain.ontouchstart=(e)=>{
            document.onmousemove=document.ontouchmove=(ev)=>{
                const x=ev.clientX||ev.touches[0].clientX;
                const w=window.innerWidth-x; side.style.width=w+'px'; side.style.flex='none';
                if(window.innerWidth >= window.innerHeight) lastLandscapeWidth = w+'px';
                syncOverlay(); updateMinScale();
            };
            document.onmouseup=document.ontouchend=()=>{document.onmousemove=null};
        };
        resInner.onmousedown=resInner.ontouchstart=(e)=>{
            document.onmousemove=document.ontouchmove=(ev)=>{
                const y=ev.clientY||ev.touches[0].clientY;
                const h=window.innerHeight-y; side.style.height=h+'px'; side.style.flex=`0 0 ${h}px`;
                if(window.innerWidth < window.innerHeight) lastPortraitHeight = h+'px';
            };
            document.onmouseup=document.ontouchend=()=>{document.onmousemove=null};
        };
    }

    window.onload = async () => {
        const el = document.getElementById('panzoom-element'); pz = Panzoom(el, { maxScale: 8, contain: 'outside', animate: true });
        window.addEventListener('resize', () => { 
            const side = document.getElementById('side-panel');
            if (window.innerWidth < window.innerHeight) {
                side.style.width = ""; side.style.height = lastPortraitHeight; side.style.flex = `0 0 ${lastPortraitHeight}`;
            } else {
                side.style.height = ""; side.style.width = lastLandscapeWidth; side.style.flex = "none";
            }
            syncOverlay(); updateMinScale(); refreshCollision(); 
        });
        el.addEventListener('panzoomchange', () => { applyMarkerStyles(); refreshCollision(); });
        document.getElementById('map-section').addEventListener('wheel', pz.zoomWithWheel);
        const res = await fetch(`folder.csv?t=${Date.now()}`); const folders = parseCSV(await res.text()).slice(1);
        const select = document.getElementById('folder-select'); select.innerHTML = '<option value="">-- 請選擇史地章節 --</option>';
        folders.forEach(f => { if(f[0]) { const opt = document.createElement('option'); opt.value = f[0]; opt.innerText = f[1] || f[0]; select.appendChild(opt); } });
        const last = localStorage.getItem('lastBibleFolder'); if (last) { select.value = last; loadProject(last); }
        initResizers();
    };
</script>
</body>
</html>
