<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>亞伯拉罕史地互動地圖 V4.9</title>
    <script src="https://unpkg.com/@panzoom/panzoom@4.5.1/dist/panzoom.min.js"></script>
    <style>
        :root { --gold: #c5a059; --bg-dark: #2c3e50; --text-light: #ecf0f1; }
        * { box-sizing: border-box; font-family: "微軟正黑體", sans-serif; }
        body { margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; background: #222; }
        
        #app-container { display: flex; flex-direction: column; height: 100%; width: 100%; }
        @media (min-aspect-ratio: 1/1) { #app-container { flex-direction: row; } }

        #map-section { flex: 1.5; position: relative; overflow: hidden; background: #222; cursor: grab; }
        #panzoom-element { position: relative; display: inline-block; transform-origin: 0 0; }
        #bg-map { display: block; max-width: none; }
        
        #overlay-container { position: absolute; pointer-events: none; top: 0; left: 0; }
        #svg-layer, #marker-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        /* 標記樣式 */
        .marker { position: absolute; transform: translate(-50%, -50%); padding: 4px 10px; border-radius: 20px; font-size: 13px; font-weight: bold; background: rgba(255,255,255,0.95); border: 1px solid #777; color: #333; white-space: nowrap; pointer-events: auto; cursor: pointer; z-index: 50; box-shadow: 0 2px 6px rgba(0,0,0,0.3); }
        .marker.active { background: var(--gold); color: white; border: 2px solid white; font-size: 15px; z-index: 100; box-shadow: 0 0 15px rgba(197, 160, 89, 0.8); }
        .marker-dot-only { padding: 0; width: 10px; height: 10px; border-radius: 50%; background: #888; border: 1px solid white; color: transparent !important; overflow: hidden; z-index: 10; opacity: 0.6; }

        #table-section { flex: 1; background: white; overflow-y: auto; border-top: 5px solid var(--gold); }
        @media (min-aspect-ratio: 1/1) { #table-section { border-top: none; border-left: 5px solid var(--gold); } }
        table { width: 100%; border-collapse: collapse; }
        th { background: var(--bg-dark); color: white; position: sticky; top: 0; padding: 12px; text-align: left; z-index: 20; }
        td { padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 14px; }
        tr.selected td { background: #fff9c4; font-weight: bold; border-left: 5px solid var(--gold); }

        /* 可拖動資訊框 */
        #info-box { position: fixed; top: 20px; right: 20px; width: 340px; background: white; border-radius: 8px; box-shadow: 0 10px 40px rgba(0,0,0,0.4); border-top: 6px solid var(--gold); z-index: 2000; display: none; flex-direction: column; }
        #info-header { padding: 12px; background: #f8f9fa; display: flex; justify-content: space-between; align-items: center; border-radius: 8px 8px 0 0; cursor: move; border-bottom: 1px solid #eee; user-select: none; }
        #info-body { padding: 15px; max-height: 70vh; overflow-y: auto; display: block; }
        
        .dist-badge { background: #e74c3c; color: white; padding: 3px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; margin-bottom: 10px; display: inline-block; }
        .path-info { background: #f1f2f6; padding: 10px; border-radius: 4px; font-size: 13px; margin-bottom: 10px; border-left: 4px solid #747d8c; line-height: 1.5; }
        .time-info { font-size: 13px; color: #7f8c8d; margin-bottom: 8px; display: block; }

        .controls-map { position: absolute; bottom: 20px; left: 20px; z-index: 100; display: flex; flex-direction: column; gap: 8px; }
        .controls-map button { width: 45px; height: 45px; border-radius: 8px; border: 1px solid #ccc; background: white; cursor: pointer; font-size: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .btn-tool { border: none; background: none; cursor: pointer; font-size: 18px; color: #999; padding: 0 5px; }
        .btn-tool:hover { color: var(--gold); }
    </style>
</head>
<body>

<div id="app-container">
    <div id="map-section">
        <div id="panzoom-element">
            <img src="Abraham_2_Cute.png" id="bg-map">
            <div id="overlay-container">
                <svg id="svg-layer"></svg>
                <div id="marker-layer"></div>
            </div>
        </div>
        <div class="controls-map">
            <button onclick="pz.zoomIn()">+</button>
            <button onclick="pz.zoomOut()">-</button>
            <button onclick="resetView()">↺</button>
        </div>
    </div>
    <div id="table-section">
        <table id="main-table">
            <thead><tr><th width="40">#</th><th>關鍵事件</th></tr></thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<div id="info-box">
    <div id="info-header" onmousedown="dragStart(event)">
        <span style="font-weight:bold; pointer-events:none;">📍 事件詳情 (按住此處拖動)</span>
        <div>
            <button onclick="toggleMinimize()" class="btn-tool">－</button>
            <button onclick="closeInfoBox()" class="btn-tool">✕</button>
        </div>
    </div>
    <div id="info-body">
        <span id="info-time" class="time-info"></span>
        <h3 id="info-title" style="margin:0 0 12px 0; color:var(--gold); line-height:1.4;"></h3>
        
        <div id="info-path-area" class="path-info"></div>
        <div id="info-dist-area"></div>
        
        <p id="info-loc-tags" style="margin-top:10px;"></p>
        <p style="margin-bottom:5px;"><strong>📖 引用經文：</strong></p>
        <div id="info-scripture" style="color:#2980b9; margin-bottom:10px; font-size:14px;"></div>
        <p style="margin-bottom:5px;"><strong>📝 備註：</strong></p>
        <div id="info-note" style="font-size:13px; color:#444; line-height:1.6; background: #fdfdfd; padding: 10px; border: 1px solid #eee; border-radius: 4px;"></div>
    </div>
</div>

<script>
    let pz, eventData = [], freqMap = {};
    let coordsSmall = {}, coordsLarge = {};
    let currentMap = 'small', currentActivePlaces = [];
    
    // 拖動功能變數
    let isDragging = false, offset = { x: 0, y: 0 };

    const mapImg = document.getElementById('bg-map');
    const overlay = document.getElementById('overlay-container');
    const elem = document.getElementById('panzoom-element');
    const infoBox = document.getElementById('info-box');

    pz = Panzoom(elem, { maxScale: 5, minScale: 0.1, contain: 'outside' });
    document.getElementById('map-section').addEventListener('wheel', pz.zoomWithWheel);

    async function loadData() {
        try {
            const t = Date.now();
            const [sRes, lRes, dRes] = await Promise.all([
                fetch(`小圖座標.csv?t=${t}`), 
                fetch(`大圖座標.csv?t=${t}`), 
                fetch(`data.csv?t=${t}`)
            ]);
            
            const [sText, lText, dText] = await Promise.all([sRes.text(), lRes.text(), dRes.text()]);

            parseCSV(sText).slice(1).forEach(r => {
                if(r[1]) coordsSmall[r[1].trim()] = { x: parseFloat(r[5]), y: parseFloat(r[6]) };
            });

            parseCSV(lText).slice(1).forEach(r => {
                if(r[1]) coordsLarge[r[1].trim()] = { x: parseFloat(r[5]), y: parseFloat(r[6]) };
            });

            const tbody = document.getElementById('table-body');
            tbody.innerHTML = ''; 
            eventData = [];

            const rows = parseCSV(dText);
            console.log("CSV 總行數:", rows.length); // 除錯用

            for(let i=1; i < rows.length; i++) {
                const r = rows[i];
                // 修正：只要這行有基本內容，就不跳過 (放寬判斷確保 87, 88 進場)
                if(r.length < 2 || (!r[0] && !r[2])) continue; 
                
                const locRaw = r[3] || "";
                const locs = locRaw.split('→').map(p => p.replace(/\(.*?\)/g, '').trim()).filter(s => s !== "");
                locs.forEach(p => { if(p) freqMap[p] = (freqMap[p] || 0) + 1; });
                
                const item = { id: r[0], time: r[1], event: r[2], loc: locRaw, script: r[4], note: r[5] };
                eventData.push(item);
                
                const currentIdx = eventData.length - 1;
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${item.id || ''}</td><td>${item.event || ''}</td>`;
                tr.onclick = function() { selectEvent(currentIdx, this); };
                tbody.appendChild(tr);
            }
            console.log("成功載入事件數:", eventData.length);

            if (mapImg.complete) syncOverlaySize();
            else mapImg.onload = syncOverlaySize;

        } catch (err) {
            console.error("載入失敗:", err);
        }
    }

    function syncOverlaySize() {
        overlay.style.width = mapImg.clientWidth + "px";
        overlay.style.height = mapImg.clientHeight + "px";
        renderMarkers(currentMap, []);
    }

    async function changeMapImage(target) {
        if (currentMap === target) return;
        currentMap = target;
        const newSrc = target === 'large' ? 'Abraham_1_Cute.png' : 'Abraham_2_Cute.png';
        return new Promise(resolve => {
            mapImg.onload = () => { syncOverlaySize(); resolve(); };
            mapImg.src = newSrc;
        });
    }

    async function selectEvent(idx, tr) {
        document.querySelectorAll('tr').forEach(r => r.classList.remove('selected'));
        tr.classList.add('selected');
        
        const item = eventData[idx];
        const places = item.loc.split('→').map(p => p.replace(/\(.*?\)/g, '').trim()).filter(s => s !== "");
        
        let activePlaces = [], needLarge = false;

        places.forEach(p => {
            if (coordsSmall[p]) {
                activePlaces.push({ ...coordsSmall[p], name: p });
            } else if (coordsLarge[p]) {
                activePlaces.push({ ...coordsLarge[p], name: p });
                needLarge = true; 
            }
        });

        currentActivePlaces = activePlaces;
        await changeMapImage(needLarge ? 'large' : 'small');
        renderMarkers(currentMap, activePlaces);
        flyTo(activePlaces);
        showInfo(item, activePlaces);
    }

    function renderMarkers(type, actives) {
        const markerLayer = document.getElementById('marker-layer');
        const svgLayer = document.getElementById('svg-layer');
        markerLayer.innerHTML = ''; svgLayer.innerHTML = '';
        
        const currentCoords = type === 'large' ? coordsLarge : coordsSmall;
        const activeNames = actives.map(a => a.name);

        if(actives.length > 1) {
            for(let i=0; i<actives.length-1; i++) {
                const p1 = currentCoords[actives[i].name];
                const p2 = currentCoords[actives[i+1].name];
                if(p1 && p2) {
                    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    line.setAttribute('x1', p1.x+'%'); line.setAttribute('y1', p1.y+'%');
                    line.setAttribute('x2', p2.x+'%'); line.setAttribute('y2', p2.y+'%');
                    line.setAttribute('stroke', '#e74c3c'); line.setAttribute('stroke-width', '3'); line.setAttribute('stroke-dasharray', '6,4');
                    svgLayer.appendChild(line);
                }
            }
        }

        Object.keys(currentCoords).forEach(name => {
            const loc = currentCoords[name];
            const isActive = activeNames.includes(name);
            const m = document.createElement('div');
            m.style.left = loc.x + '%'; m.style.top = loc.y + '%';
            
            if (isActive) {
                m.className = 'marker active';
                m.textContent = name;
                markerLayer.appendChild(m);
            } else if ((freqMap[name] || 0) > 2) { 
                m.className = 'marker low-priority';
                m.textContent = name;
                markerLayer.appendChild(m);
            } else {
                m.className = 'marker marker-dot-only';
                m.title = name;
                markerLayer.appendChild(m);
            }
            m.onclick = (e) => { e.stopPropagation(); flyTo([{...loc, name}]); };
        });
    }

    function flyTo(pts) {
        const currentCoords = currentMap === 'large' ? coordsLarge : coordsSmall;
        let sx=0, sy=0, c=0;
        pts.forEach(p => { 
            const coord = currentCoords[p.name];
            if(coord){ sx+=coord.x; sy+=coord.y; c++; }
        });
        if(!c) return;
        const tx = (sx/c/100)*overlay.offsetWidth, ty = (sy/c/100)*overlay.offsetHeight;
        const sc = pz.getScale();
        pz.pan((elem.parentElement.offsetWidth/2)-(tx*sc), (elem.parentElement.offsetHeight/2)-(ty*sc), {animate:true});
    }

    function showInfo(item, actives) {
        infoBox.style.display = 'flex';
        document.getElementById('info-time').textContent = item.time || '';
        document.getElementById('info-title').textContent = item.event;
        document.getElementById('info-scripture').textContent = item.script;
        document.getElementById('info-note').textContent = item.note || '無備註資訊';

        const pathArea = document.getElementById('info-path-area');
        const distArea = document.getElementById('info-dist-area');
        
        const distMatch = item.loc.match(/\(([^)]+)\)/);
        const distText = distMatch ? distMatch[1] : null;
        
        // 解析起點與終點
        const pureLocs = item.loc.replace(/\(.*?\)/g, '').split('→').map(s => s.trim()).filter(s => s !== "");
        if(pureLocs.length >= 2) {
            pathArea.innerHTML = `🏁 <strong>起點：</strong>${pureLocs[0]}<br>🎯 <strong>終點：</strong>${pureLocs[pureLocs.length-1]}`;
            pathArea.style.display = 'block';
        } else if (pureLocs.length === 1) {
            pathArea.innerHTML = `📍 <strong>地點：</strong>${pureLocs[0]}`;
            pathArea.style.display = 'block';
        } else {
            pathArea.style.display = 'none';
        }
        
        distArea.innerHTML = distText ? `<span class="dist-badge">📏 總移動距離：${distText}</span>` : '';

        const tags = document.getElementById('info-loc-tags');
        tags.innerHTML = '';
        actives.forEach(p => {
            const s = document.createElement('span'); 
            s.textContent = p.name;
            s.style.cssText = "background:#f0f0f0; padding:3px 10px; margin:2px; border-radius:12px; cursor:pointer; display:inline-block; font-size:12px; border:1px solid #ddd;";
            s.onclick = () => flyTo([p]); 
            tags.appendChild(s);
        });
    }

    // --- 強化拖動功能 ---
    function dragStart(e) {
        isDragging = true;
        // 取得當前位置與滑鼠點擊位置的偏差
        const rect = infoBox.getBoundingClientRect();
        offset.x = e.clientX - rect.left;
        offset.y = e.clientY - rect.top;
        
        // 重要：開始拖動時，將 CSS 的 right/bottom 屬性移除，避免 left/top 失效
        infoBox.style.right = 'auto';
        infoBox.style.bottom = 'auto';
        
        document.addEventListener('mousemove', dragMove);
        document.addEventListener('mouseup', dragEnd);
    }
    
    function dragMove(e) {
        if (!isDragging) return;
        e.preventDefault(); // 防止拖動時選取到背景文字
        infoBox.style.left = (e.clientX - offset.x) + 'px';
        infoBox.style.top = (e.clientY - offset.y) + 'px';
    }
    
    function dragEnd() { 
        isDragging = false; 
        document.removeEventListener('mousemove', dragMove);
        document.removeEventListener('mouseup', dragEnd);
    }
    
    function toggleMinimize() {
        const body = document.getElementById('info-body');
        body.style.display = body.style.display === 'none' ? 'block' : 'none';
    }
    function closeInfoBox() { document.getElementById('info-box').style.display = 'none'; }
    function resetView() { pz.reset(); if(currentActivePlaces.length) flyTo(currentActivePlaces); }

    // --- 強化 CSV 解析器，支援多種換行與結尾處理 ---
    function parseCSV(t) {
        const cleanT = t.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
        let r=[], c=[], cell='', q=false;
        for(let i=0; i<cleanT.length; i++){
            let char=cleanT[i];
            if(char==='"' && cleanT[i+1]==='"'){ cell+='"'; i++; }
            else if(char==='"'){ q=!q; }
            else if(char===',' && !q){ c.push(cell.trim()); cell=''; }
            else if(char==='\n' && !q){ c.push(cell.trim()); r.push(c); c=[]; cell=''; }
            else cell+=char;
        }
        if(cell || c.length) { c.push(cell.trim()); r.push(c); }
        return r;
    }

    window.onload = loadData;
</script>
</body>
</html>
