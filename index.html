<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>亞伯拉罕史地互動地圖 V9.5</title>
    <script src="https://unpkg.com/@panzoom/panzoom@4.5.1/dist/panzoom.min.js"></script>
    <style>
        /* --- 100% 完全保留 V8.3 原始 CSS --- */
        :root { --gold: #c5a059; --dark: #2c3e50; --handle-bg: #ddd; }
        * { box-sizing: border-box; font-family: "微軟正黑體", sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; width: 100vw; height: 100dvh; overflow: hidden; background: #000; }
        #app-container { display: flex; width: 100%; height: 100%; flex-direction: row; }
        @media (max-width: 800px) and (orientation: portrait) { 
            #app-container { flex-direction: column; } 
            #side-panel { width: 100% !important; flex: 0 0 50dvh; }
        }
        #map-section { flex-grow: 1; position: relative; overflow: hidden; background: #111; display: flex; justify-content: center; align-items: center; }
        #resizer-h { width: 12px; background: var(--handle-bg); cursor: col-resize; z-index: 11; display: flex; align-items: center; justify-content: center; }
        #resizer-h::after { content: "⋮"; color: #666; font-size: 20px; }
        #side-panel { width: 400px; background: #fff; display: flex; flex-direction: column; z-index: 10; box-shadow: -2px 0 10px rgba(0,0,0,0.1); }
        #info-panel { height: 40%; background: #fff; display: flex; flex-direction: column; border-bottom: 1px solid #eee; position: relative; }
        #info-header { background: var(--dark); color: var(--gold); padding: 12px; font-weight: bold; font-size: 1.1rem; }
        #info-body { flex-grow: 1; padding: 15px; overflow-y: auto; line-height: 1.6; font-size: 0.95rem; color: #333; }
        #resizer-v { height: 12px; background: var(--handle-bg); cursor: row-resize; z-index: 11; display: flex; align-items: center; justify-content: center; }
        #resizer-v::after { content: "⋯"; color: #666; font-size: 20px; }
        
        /* 僅新增：下拉選單的必要樣式，不影響排版 */
        #folder-selector-container { background: #f4f4f4; padding: 10px; border-bottom: 1px solid #ddd; }
        #folder-select { width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #ccc; font-size: 14px; }

        #table-container { flex-grow: 1; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f4f4f4; color: var(--dark); position: sticky; top: 0; padding: 12px; font-weight: bold; text-align: left; z-index: 5; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 0.95rem; cursor: pointer; }
        tr.active td { background: rgba(197, 160, 89, 0.15); border-left: 4px solid var(--gold); font-weight: bold; }
        #panzoom-element { position: relative; transform-origin: 0 0; }
        #base-map { display: block; max-width: none; pointer-events: none; }
        #overlay-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: visible; }
        #controls { position: absolute; bottom: 20px; left: 20px; display: flex; gap: 10px; z-index: 100; }
        .btn { width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.9); border: none; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div id="app-container">
    <div id="map-section">
        <div id="panzoom-element">
            <img id="base-map" src="">
            <svg id="overlay-svg"></svg>
        </div>
        <div id="controls">
            <button class="btn" onclick="pz.zoomIn()">＋</button>
            <button class="btn" onclick="pz.zoomOut()">－</button>
            <button class="btn" onclick="resetView()">↺</button>
        </div>
    </div>

    <div id="resizer-h"></div>

    <div id="side-panel">
        <div id="info-panel">
            <div id="info-header">事件詳情</div>
            <div id="info-body">請從下方列表選擇事件...</div>
        </div>
        
        <div id="resizer-v"></div>

        <div id="folder-selector-container">
            <select id="folder-select">
                <option value="">載入地圖清單中...</option>
            </select>
        </div>

        <div id="table-container">
            <table>
                <thead><tr><th width="50">序</th><th>關鍵事件內容</th></tr></thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let pz, eventData = [], coordData = [], currentEventIdx = -1;

    // 1. 讀取資料夾清單 (folder.csv)
    async function initFolderSelect() {
        try {
            const response = await fetch('folder.csv');
            const csvText = await response.text();
            const folders = parseCSV(csvText, true);
            
            const select = document.getElementById('folder-select');
            select.innerHTML = ''; // 清空提示
            
            folders.forEach(f => {
                const opt = document.createElement('option');
                opt.value = f.folder_name;
                opt.textContent = f.display_name || f.folder_name;
                select.appendChild(opt);
            });

            // 監聽切換事件
            select.onchange = (e) => loadData(e.target.value);
            
            // 預設載入第一個
            if (folders.length > 0) loadData(folders[0].folder_name);
            
        } catch (err) {
            console.error("無法讀取 folder.csv", err);
        }
    }

    // 2. 載入指定資料夾的數據 (將原本寫死的路徑改為變數)
    async function loadData(folderPath) {
        try {
            const [dataRes, coordRes] = await Promise.all([
                fetch(`${folderPath}/data.csv`).then(r => r.text()),
                fetch(`${folderPath}/coords_1.csv`).then(r => r.text())
            ]);

            eventData = parseCSV(dataRes, true);
            coordData = parseCSV(coordRes, true);

            const img = document.getElementById('base-map');
            img.src = `${folderPath}/picture_1.png`;

            img.onload = () => {
                syncOverlay();
                renderTable();
                pz.reset();
            };
        } catch (err) {
            console.error("載入資料失敗，請確認資料夾與檔案名稱正確", err);
        }
    }

    // --- 以下為 V8.3 原始函數，完全沒動 ---

    function renderTable() {
        const tb = document.getElementById('table-body');
        tb.innerHTML = '';
        eventData.forEach((row, i) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${row['序號']}</td><td>${row['關鍵事件內容']}</td>`;
            tr.onclick = () => selectEvent(i, tr);
            tb.appendChild(tr);
        });
    }

    function selectEvent(idx, tr) {
        currentEventIdx = idx;
        const row = eventData[idx];
        document.querySelectorAll('#table-body tr').forEach(r => r.classList.remove('active'));
        tr.classList.add('active');

        document.getElementById('info-header').textContent = `${row['序號']}. ${row['關鍵事件內容']}`;
        document.getElementById('info-body').innerHTML = `
            <b>📍 地點：</b>${row['地點 (距離)']}<br>
            <b>📖 經文：</b>${row['引用經文']}<br><br>
            <b>💡 備註：</b>${row['備註 (關聯、釋義、補充)'] || ''}
        `;

        const locs = row['地點 (距離)'].replace(/\([^)]*\)/g, '').split(/[→,，、]/).map(s => s.trim()).filter(s => s);
        const pts = locs.map(l => coordData.find(c => l.includes(c['地名']) || c['地名'].includes(l))).filter(x => x);
        drawMarkers(pts);
    }

    function drawMarkers(pts) {
        const svg = document.getElementById('overlay-svg');
        const img = document.getElementById('base-map');
        svg.innerHTML = '';
        if(!pts.length) return;

        let sx = 0, sy = 0;
        pts.forEach(p => {
            const x = parseFloat(p['百分比X'])/100 * img.naturalWidth;
            const y = parseFloat(p['百分比Y'])/100 * img.naturalHeight;
            sx += x; sy += y;
            const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            g.innerHTML = `<circle cx="${x}" cy="${y}" r="6" fill="red" stroke="white" stroke-width="2"/>
                           <text x="${x+10}" y="${y+5}" fill="white" font-weight="bold" style="paint-order:stroke; stroke:black; stroke-width:3px;">${p['地名']}</text>`;
            svg.appendChild(g);
        });

        const s = pz.getScale();
        pz.pan((document.getElementById('map-section').clientWidth/2) - (sx/pts.length * s), 
               (document.getElementById('map-section').clientHeight/2) - (sy/pts.length * s), {animate:true});
    }

    function syncOverlay() {
        const img = document.getElementById('base-map');
        document.getElementById('overlay-svg').setAttribute('viewBox', `0 0 ${img.naturalWidth} ${img.naturalHeight}`);
    }

    function parseCSV(text, hasHeader) {
        const rows = [];
        let row = [], cell = '', q = false;
        for (let i = 0; i < text.length; i++) {
            let c = text[i], n = text[i+1];
            if (c === '"' && q && n === '"') { cell += '"'; i++; }
            else if (c === '"') q = !q;
            else if (c === ',' && !q) { row.push(cell.trim()); cell = ''; }
            else if ((c === '\n' || c === '\r') && !q) {
                if (row.length > 0 || cell) { row.push(cell.trim()); rows.push(row); }
                row = []; cell = ''; if (c === '\r' && n === '\n') i++;
            } else cell += c;
        }
        if (row.length > 0 || cell) { row.push(cell.trim()); rows.push(row); }
        if (!hasHeader) return rows;
        const h = rows.shift().map(x => x.replace(/^\ufeff/, ''));
        return rows.map(r => { let o = {}; h.forEach((k, i) => o[k] = r[i]); return o; });
    }

    function resetView() { pz.reset(); }

    window.onload = () => {
        pz = Panzoom(document.getElementById('panzoom-element'), { maxScale: 8, contain: 'outside' });
        initFolderSelect(); // 改為執行初始化選單
        
        // --- 8.3 原始拉桿邏輯 ---
        const resH = document.getElementById('resizer-h'), resV = document.getElementById('resizer-v');
        const side = document.getElementById('side-panel'), info = document.getElementById('info-panel');
        let isH = false, isV = false;
        resH.onmousedown = () => isH = true;
        resV.onmousedown = () => isV = true;
        document.onmousemove = (e) => {
            if(isH) side.style.width = (window.innerWidth - e.clientX) + 'px';
            if(isV) info.style.height = (e.clientY - side.offsetTop) + 'px';
        };
        document.onmouseup = () => isH = isV = false;
    };
</script>
</body>
</html>
